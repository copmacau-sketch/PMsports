<!DOCTYPE html>
<!-- saved from url=(0046)https://ag.hga025.com/tpl/zh-tw/FT_parlay.html -->
<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<script>{JS}</script>
<style>{CSS}</style>


<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="X-UA-Compatible" content="ie=edge">

<title></title>
</head>
<body>
<div>



		<!-- 盤面資料表格 -->
        <div id="report_list_b_model">

            <!-- 報表固定header -->
            <div id="re_head_fixed" class="re_head_fixed original hide_on_mini_only hide_on_small_only">
                <!-- 沒有按到的排序class="re_sort"  大到小加上 class="sort_down"  小到大加上 class="sort_up" -->
                <table cellpadding="0" cellspacing="0" class="re_table_main">
                    <thead>
                        <tr class="re_table_head_actG">
                            <td class="re_td_w16 txtl">
                                <div name="sort_btn" data-sort="DATETIME" class="tbet_tdTxt re_sort sort_down">日期</div>
                            </td>
                            <td class="re_td_w16 txtl">
                                <div class="tbet_tdTxt">
                                    會員 /<br>退水
                                </div>
                            </td>
                            <td class="re_td_w16 txtl">
                                <div class="tbet_tdTxt">注單號</div>
                            </td>
                            <td class="re_td_w20 txtl">
                                <div class="tbet_tdTxt">玩法</div>
                            </td>
                            <td class="re_td_w16">
                                <div name="sort_btn" data-sort="GOLD" class="tbet_tdTxt re_sort">下注金額</div>
                            </td>
                            <td class="re_td_w16">
                                <div name="sort_btn" data-sort="WIN_GOLD" class="tbet_tdTxt re_sort">可贏金額 </div>
                            </td>
                        </tr>
                    </thead>
                </table>
            </div>



            <!-- 盤面資料生成model -->
            <div id="re_body_scroll" class="re_body_scroll high_animate">
                <table cellpadding="0" cellspacing="0" class="re_table_main">
                    <tbody>
                        <!-- START DYNAMIC BLOCK: row0 -->
                        <tr id="tid_*TID*" class="re_table_body_auto">
                            <!-- 768以上 -->
                            <td class="re_td_w16 txtl word_gray hide_on_mini_only hide_on_small_only">
                                *DATE*<br>*TIME*
                            </td>
                            <td class="re_td_w16 txtl word_gray hide_on_mini_only hide_on_small_only">
                                *NAME0*<br>*M_TYPE* *IN_RADIO*
                            </td>
                            <td class="re_td_w16 txtl word_gray hide_on_mini_only hide_on_small_only">
                                *TID*
                            </td>
                            <td class="re_td_w20 txtl hide_on_mini_only hide_on_small_only">
                                <div class="word_gray">*GT*</div>
                                <div class="word_bold">*TNAME*</div>
                                <span class="re_detailbig_status">*BALL_ACT*</span>
                            </td>
                            <td class="re_td_w16 hide_on_mini_only hide_on_small_only">
                                *GOLD*
                            </td>
                            <td class="re_td_w16 hide_on_mini_only hide_on_small_only">
                                *WIN_GOLD*
                            </td>
                            <!-- 768以上end -->


                            <!-- 768以下 -->
                            <td class="txtl word_gray hide_on_med_only hide_on_large_only">
                                <ul class="re_betDetailUL">
                                    <li class="re_betdetail_liTime">
                                        *DATE* *TIME*
                                    </li>
                                    <li>
                                        *GT*
                                    </li>
                                    <li class="word_black word_bold500">
                                        *TNAME*
                                    </li>
                                    <li class="re_detailbig_status">
                                        *BALL_ACT*
                                    </li>
                                    <li class="re_betdetail_liBold">
                                        *NAME0*<tt class="ml12">*M_TYPE* *IN_RADIO*</tt>
                                    </li>
                                    <li class="re_betdetail_liWl">
                                        <div>
                                            <tt>下注金額:</tt>
                                            *GOLD*
                                        </div>

                                        <div>
                                            <tt>可贏金額:</tt>
                                            <span class="word_bold500">*WIN_GOLD*</span>
                                        </div>
                                    </li>
                                </ul>
                            </td>
                            <!-- 768以下end -->
                        </tr>
                        <!-- END DYNAMIC BLOCK: row0 -->
                    </tbody>
                </table>
            </div>
           <!-- 盤面資料生成model end -->


        </div>
        <!-- 盤面資料表格end -->







</div>

</body></html>
