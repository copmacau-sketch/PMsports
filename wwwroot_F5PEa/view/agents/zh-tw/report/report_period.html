        /*架構區*/
        .main{
            width: 100%;
            height: 100%;
            padding-bottom: constant(safe-area-inset-bottom);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .main_rotate{
            width: 100.1%;
            height: 100.1%;
        }/*解決ios12網址+功能列消失 高度出錯及fixed物件原地不動問題*/


        .ma_all{
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;

        }
        .ma_header{
            width: 100%;
            height: 56px;
            z-index: 8;
        }
        .ma_main, .ma_main_foothide{
            position: relative;
            display: flex;
            width: 100%;
            min-width: 100%;
            height: calc(100% - 56px);
            background: #fff;
            flex-direction: row;
            flex: 0 0 100%;
            overflow: hidden;
        }
        .ma_foot{
            position: absolute;
            width: 100%;
            height: 56px;
            background-color: #b03427;
            bottom: constant(safe-area-inset-bottom);
            bottom: env(safe-area-inset-bottom);
            -webkit-transform: translate3d(0,100%,0);
            transform: translate3d(0,100%,0);
            z-index: 7;
        }
        .ios15_height .ma_foot{
            position: fixed;
        }
        .ma_right{
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            z-index: 1000;
            background-color: #fff;
            box-shadow: -2px 0 4px 0 rgba(0, 0, 0, 0);
            -webkit-transform: translate3d(100%,0,0);
            transform: translate3d(100%,0,0);
        }
        .ma_right.ma_extend{
            box-shadow: -2px 0 4px 0 rgba(0, 0, 0, .2);
            -webkit-transform: translate3d(0%,0,0);
            transform: translate3d(0%,0,0);
        }
        .ma_alert{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1000;/*為了報表fixed head問題 因此數值只能再更大*/
        }
        .ma_loading,
        .ma_loadingfull{
            position: absolute;
            right: 0;
            width: calc(100% - 56px);
            height: 100%;
            z-index: 7;
        }
        .ma_loadingfull{
            position: fixed;
            width: 100%;
            height: calc(100% - 120px);
            top: 120px;
        }
        .ma_extend ~ .ma_loading{width: calc(100% - 240px);}
        .pwd_loading{
            position: fixed;
            width: 100%;
            height: 100%;
            top: 56px;
            left: 0;
            z-index: 7;
        }
        .filter_loading{
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }
        .ma_onepage{
            width: 100%;
            height: 100%;
        }
        .ma_left{
            position: absolute;
            display: inline-block;
            width: 56px;
            height: 100%;
            background: #2d4150;
            cursor: pointer;
            -webkit-overflow-scrolling: touch;
            left: 0;
            z-index: 1000;
        }
        .ma_left.ma_extend{
            visibility: visible;
            width: 240px;
            -webkit-flex: 0 0 240px;
            -ms-flex: 0 0 240px;
            flex: 0 0 240px;
        }
        .ma_content{
            position: relative;
            display: inline-block;
            width: 100%;
            height: 100%;
            -webkit-flex: 0 0 100%;
            -ms-flex: 0 0 100%;
            flex: 0 0 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .ma_content>div:not(.require_box){
            width: auto;
            height: auto;
            min-height: 100%;
            padding-bottom: 30px;
            overflow: visible;
        }
        .ma_contentfull{
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .ma_extend ~ .ma_left_mask{position: fixed;width:calc(100vw - 240px);height: 100vh;top: 0;right: 0;}
        .ma_extend ~ .ma_right_mask{position: fixed;width:100vw;height: 100vh;top: 0;left: 0;z-index: 8;}
        @media only screen and (min-width:1024px){
            .ma_main,
            .ma_main_foothide{
                padding-left: 56px;
            }
        }
        @media only screen and (max-width:1023px){
            .ma_left{
                width: 0;
                visibility: collapse;
                transform: translate3d(-56px,0,0);
            }
            .ma_left.ma_extend{
                visibility: visible;
                width: 240px;
                -webkit-transform: translate3d(0%,0,0);
                transform: translate3d(0%,0,0);
            }
            .ma_loading{
                width: 100%;
            }

        }
        @media only screen and (max-width:767px){

        /*animate*/
        /*開啟加上active*/
        .use_animate{
            opacity: 0;
            visibility: collapse;
            z-index: 6;
            -webkit-transform: scale(1, 0);
            -ms-transform: scale(1, 0);
            transform: scale(1, 0);
            -webkit-transform-origin:0 0;
            -ms-transform-origin:0 0;
            transform-origin:0 0;
            -webkit-transition:all 300ms cubic-bezier(.55,0,.42,1);
            -ms-transition:all 300ms cubic-bezier(.55,0,.42,1);
            transition:all 300ms cubic-bezier(.55,0,.42,1);
        }

        .active .use_animate,
        .active + .use_animate{
            opacity: 1;
            visibility: visible;
            -webkit-transform: scale(1, 1);
            -ms-transform: scale(1, 1);
            transform: scale(1, 1);
        }


        /*關閉加上active*/
        .high_animate{
            height: 100%;
            opacity: 1;
            visibility: visible;
            -webkit-transform-origin:center 0;
            -ms-transform-origin:center 0;
            transform-origin:center 0;
            -webkit-transform: scale(1, 1);
            -ms-transform: scale(1, 1);
            transform: scale(1, 1);
            -webkit-transition:all 300ms cubic-bezier(.55,0,.42,1);
            -ms-transition:all 300ms cubic-bezier(.55,0,.42,1);
            transition:all 300ms cubic-bezier(.55,0,.42,1);
        }

        .active .high_animate,
        .active + .high_animate{
            height: 0;
            opacity: 0;
            visibility: collapse;
            -webkit-transform: scale(1, 0);
            -ms-transform: scale(1, 0);
            transform: scale(1, 0);
        }
