<!DOCTYPE html>
<html>

<head>
  <script>{JS}</script>
  <style>{CSS}</style>

  <meta http-equiv="Content-type" content="text/html; charset=utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">

  <title></title>
</head>

<body>
<div>


  <div class="ps_main">
    <h1 class="ps_title">
      <span class="ps_back_btn" id="back"></span>
      <span>创建登入帐号</span>
    </h1>



    <!-- 设定登入帐号 -->
    <div class="psG" style="display:">
      <h1 class="ps_note">
        请使用阁下容易记得的“登入帐号”以供管理端登入使用。
        <!-- 内容需展开时 请在原有class后面加上class="active" -->
        <div tabindex="0" hidefocus="true" class="ps_noteIconG" id="ps_icon">
          <ul class="ps_noteTxt use_animate" id="ps_txt">
            <li>1. 您的登入帐号必须由2个英文大小写字母(A-Z和a-z)和数字(0-9)组合, 输入限制6-12字元。</li>
            <li>2. 您的登入帐号不准许有空格。</li>
          </ul>
        </div>
      </h1>


      <!-- create ID -->
      <!-- 原有class后加上 错误状态框红色线class="err_input" 按下输入框蓝色线 class="focus_input" 短的修改成功勾勾 class="scss_iconS" -->
      <!-- <form id="ChgPwdForm" name="ChgPwdForm" method="post" action="">-->
      <div id="pwd_box" data-pwtitle="登入帐号" class="ps_input">
        <input type="text" name="" id="pwd" class="ps_chk_enter" size="12" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
        <span id="CHECK" class="ps_chk_btn" disabled>检查</span>
      </div>
      <!-- 这边的成功讯息 class="lg_scss" -->
      <div id="hr_info" class="lg_err" style="display: none;">Login ID is available</div>


      <!-- NOTE -->
      <div class="ps_end_note">
        <h1>注意</h1>
        <p>设置后将无法修改.如阁下的“登入帐号”设置完成后须以“登入帐号”登入管理端,原“登入帐号”只供识别身份使用, 不可登入。</p>
      </div>

      <!-- 上方密码输入完成disabled拿掉 -->
      <input id="SUBMIT" class="ps_submit_btn" type="button" value="提交" disabled>
      <!-- </form> -->

    </div>

    <!-- 设定登入帐号end -->







    <!-- loading -->
    <div id="pwd_loading" class="pwd_loading">
      <div class="lds_main">
        <div class="lds_all">
          <div class="lds_spinner">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
          </div>
          <div class="lds_txt">加载中</div>
        </div>
      </div>
    </div>
    <!-- loading end -->





  </div>

  <input type="hidden" name="actions" value="1">
  <input type="hidden" name="uid" value="{UID}">
  <input type="hidden" name="login_layer" value="{LOGIN_LAYER}">


</div>
</body>

</html>
