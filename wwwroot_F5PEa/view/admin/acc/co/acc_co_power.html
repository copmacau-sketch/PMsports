<!DOCTYPE html>
<html>
<head>
    <title></title>
    <meta charset=utf-8"utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=A">
    <script>{JS}</script>
    <style>{CSS}</style>
</head>
<body>
<div id="div_acc_power" class="accedit_wrap accedit_detail">
    <div class="navbar_btn">
        <div id="btn_cancel" class="btn_cancel">取消</div>
        <div id="btn_save" class="btn_submit">保存</div>
    </div>
    <div class="accadd_content content_l">
        <div>
            <div class="title">股东-登1</div>
            <div class="accadd_box accadd_general">
                <div class="box_market" id="D1_SELECT">
                    <div class="select_market" id="D1_SU_DIV">
                        <tt>总代在线</tt>
                        <label class="select_min">
                            <select name="D1_SU" id="D1_SU">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="D1_SU_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                    <div class="select_market" id="D1_AG_DIV">
                        <tt>代理在线</tt>
                        <label class="select_min">
                            <select name="D1_AG" id="D1_AG">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="D1_AG_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                    <div class="select_market" id="D1_MESS_DIV">
                        <tt>私聊会员</tt>
                        <label class="select_min">
                            <select name="D1_MESS" id="D1_MESS">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="D1_MESS_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                </div>
                <div id="MEM_DIVS">
                    <span class="title_item"><tt>会员在线</tt></span>
                    <div class="box_market">
                        <div class="select_market" id="D1_MEM_DIV">
                            <label class="select_min">
                                <select name="D1_MEM" id="D1_MEM">
                                    <option>禁用</option>
                                </select>
                            </label>
                            <label id="D1_MEM_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                                <span id="sel_text">禁用</span>
                                <ul id="sel_list" class="drop_down">
                                </ul>
                            </label>
                        </div>
                        <div class="select_market" id="D1_MEM_LOG_DIV">
                            <label class="box_check">
                                <input type="checkbox" name="D1_MEM_LOG" id="D1_MEM_LOG">
                                <tt>记录</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check" id="D1_MEM_DOMAIN_DIV">
                                <input type="checkbox" name="D1_MEM_DOMAIN" id="D1_MEM_DOMAIN">
                                <tt>网址</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check" id="D1_MEM_DOBET_DIV">
                                <input type="checkbox" name="D1_MEM_DOBET" id="D1_MEM_DOBET">
                                <tt>投注</tt>
                            </label>
                        </div>
                    </div>
                </div>
                <div id="BET_EDIT_DIV">
                    <span class="title_item"><tt>改单设置</tt></span>
                    <div class="box_market">
                        <div class="select_market" id="D1_MEM_EXCHANGE_DIV">
                            <label class="box_check">
                                <input type="checkbox" name="D1_MEM_EXCHANGE" id="D1_MEM_EXCHANGE">
                                <tt>对调</tt>
                            </label>
                        </div>
                        <div class="select_market" id="D1_MEM_EDIT_DIV">
                            <label class="box_check">
                                <input type="checkbox" name="D1_MEM_EDIT" id="D1_MEM_EDIT">
                                <tt>修改</tt>
                            </label>
                        </div>
                        <div class="select_market" id="D1_MEM_HIDE_DIV">
                            <label class="box_check">
                                <input type="checkbox" name="D1_MEM_HIDE" id="D1_MEM_HIDE">
                                <tt>隐藏</tt>
                            </label>
                        </div>
                        <div class="select_market" id="D1_MEM_DEL_DIV">
                            <label class="box_check">
                                <input type="checkbox" name="D1_MEM_DEL" id="D1_MEM_DEL">
                                <tt>删除</tt>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
