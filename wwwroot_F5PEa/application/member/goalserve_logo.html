<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goalserve Logo 测试 (Soccer)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 24px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { color: #38bdf8; font-size: 22px; margin: 0 0 4px; }
        .sub { color: #94a3b8; font-size: 13px; margin-bottom: 20px; }
        .panel { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        select, input { padding: 9px 12px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: #fff; font-size: 14px; }
        input { width: 320px; }
        button { padding: 9px 18px; border: none; border-radius: 6px; background: #38bdf8; color: #06283d; font-weight: 700; cursor: pointer; font-size: 14px; }
        button:hover { background: #7dd3fc; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; text-align: center; }
        .card img { width: 84px; height: 84px; object-fit: contain; background: #0f172a; border-radius: 8px; padding: 6px; }
        .card .id { margin-top: 10px; font-size: 13px; color: #cbd5e0; }
        .hint { color: #64748b; font-size: 12px; margin-top: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Goalserve Logo 测试面板</h1>
        <div class="sub">私钥已验证可用于 <code>data2.goalserve.com:8084</code> · 服务端磁盘永久缓存，单 logo 只抓一次（自动遵守 1 次/秒限制）</div>

        <div class="panel">
            <select id="type">
                <option value="leagues">联赛 Leagues</option>
                <option value="teams" selected>球队 Teams</option>
                <option value="players">球员 Players</option>
            </select>
            <input type="text" id="ids" value="9002,9240" placeholder="输入 ID，逗号分隔，如 9002,9240">
            <button onclick="load()">加载 Logo</button>
            <span class="hint">示例：Leagues 1151 / 18960 · Teams 9002,9240</span>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <script>
        function load() {
            const type = document.getElementById('type').value;
            const ids = document.getElementById('ids').value.split(',').map(s => s.trim()).filter(Boolean);
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            ids.forEach(id => {
                const card = document.createElement('div');
                card.className = 'card';
                // 直接用代理的 img 模式作为 <img src>，浏览器自动缓存
                const src = `goalserve_logo.php?type=${type}&id=${encodeURIComponent(id)}&img=1`;
                card.innerHTML = `<img src="${src}" alt="${id}" loading="lazy"><div class="id">${type.slice(0,-1)} #${id}</div>`;
                grid.appendChild(card);
            });
        }
        load();
    </script>
</body>
</html>
