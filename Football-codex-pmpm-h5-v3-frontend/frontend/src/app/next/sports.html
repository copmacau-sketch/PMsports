<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PM体育 移动端完整UI交互原型</title>
  <style>
    :root{
      --bg:#f4f7fc;
      --card:#ffffff;
      --card2:#f7fbff;
      --text:#101c33;
      --sub:#667792;
      --muted:#94a3b8;
      --line:rgba(30,64,120,.10);
      --blue:#2f7df6;
      --blue2:#0f65e8;
      --blue3:#eaf3ff;
      --blue4:#dfefff;
      --green:#16b978;
      --red:#ee475a;
      --orange:#ff9f32;
      --purple:#7267ff;
      --dark:#0d1b38;
      --shadow:0 10px 30px rgba(28,80,160,.10);
      --shadow2:0 18px 46px rgba(28,80,160,.16);
      --r8:8px;
      --r10:10px;
      --r12:12px;
      --r14:14px;
      --r18:18px;
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      font-synthesis-weight:none;
      color-scheme:light;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",Arial,sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f5f8fd 0%,#eef4fb 100%);
      overflow:hidden;
    }
    button,input{font:inherit;color:inherit}
    button{border:0;background:transparent;padding:0;cursor:pointer}
    input{border:0;outline:0;background:transparent}
    button{touch-action:manipulation}
    .num,.mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1,"ss01" 1;font-family:"SF Mono","Roboto Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .app{
      position:relative;
      width:100%;
      max-width:430px;
      height:100dvh;
      min-height:720px;
      margin:0 auto;
      overflow:hidden;
      background:var(--bg);
      box-shadow:0 0 0 1px rgba(20,40,80,.06),0 28px 80px rgba(14,31,74,.16);
    }
    @media (min-width:700px){body{display:grid;place-items:center;background:#dfe8f5}.app{height:844px;border-radius:30px}}

    .status-safe{height:calc(10px + env(safe-area-inset-top, 0px));background:#fff}
    .topbar{
      height:56px;
      padding:0 14px;
      display:flex;align-items:center;gap:10px;
      background:rgba(255,255,255,.94);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(18px);
      position:relative;z-index:20;
    }
    .brand{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
    .brandIcon{
      width:34px;height:34px;border-radius:10px;
      display:grid;place-items:center;
      color:#fff;background:linear-gradient(135deg,#1d74ff,#48a0ff);
      box-shadow:0 6px 18px rgba(47,125,246,.28);
      flex:0 0 auto;
    }
    .brandIcon svg{width:21px;height:21px;display:block}
    .brandName{font-size:17px;font-weight:900;letter-spacing:-.03em;white-space:nowrap}
    .pillStatus{
      height:28px;display:flex;align-items:center;gap:5px;
      border-radius:999px;background:#f1f6fd;color:#213a5f;
      padding:0 10px;font-weight:800;font-size:11px;white-space:nowrap;
      box-shadow:inset 0 0 0 1px rgba(46,104,200,.05);
    }
    .dot{width:7px;height:7px;border-radius:999px;background:var(--green);box-shadow:0 0 0 3px rgba(22,185,120,.12)}
    .iconBtn{
      width:34px;height:34px;border-radius:999px;
      display:grid;place-items:center;background:#f7faff;color:#42526b;
      box-shadow:inset 0 0 0 1px rgba(40,80,150,.08);
      flex:0 0 auto;
    }
    .iconBtn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .walletBtn{
      height:34px;display:flex;align-items:center;gap:7px;
      padding:0 10px 0 7px;border-radius:999px;background:#eef6ff;
      color:var(--blue);font-size:11px;font-weight:900;min-width:82px;
      box-shadow:inset 0 0 0 1px rgba(47,125,246,.08);
    }
    .avatar{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--blue);color:#fff;font-size:12px;font-weight:900;flex:0 0 auto}
    .walletText{line-height:1.05;text-align:left}.walletText small{display:block;color:#8394af;font-size:9px;font-weight:800}.walletText b{display:block;white-space:nowrap}

    .mainTabs{
      height:48px;display:flex;align-items:center;gap:4px;padding:0 10px;background:rgba(255,255,255,.94);
      border-bottom:1px solid var(--line);position:relative;z-index:19;overflow:auto;scrollbar-width:none;
    }
    .mainTabs::-webkit-scrollbar{display:none}
    .mainTab{
      height:34px;padding:0 12px;border-radius:999px;display:flex;align-items:center;gap:5px;
      color:#344760;font-weight:850;font-size:14px;white-space:nowrap;flex:0 0 auto;
    }
    .mainTab.active{background:#e9f3ff;color:var(--blue)}
    .countBadge{min-width:18px;height:18px;border-radius:999px;padding:0 5px;background:#eef2f7;color:#60728d;display:inline-grid;place-items:center;font-size:11px;font-weight:900}
    .mainTab.active .countBadge{background:#d8eaff;color:var(--blue)}

    .scroll{
      position:absolute;inset:calc(114px + env(safe-area-inset-top,0px)) 0 0;
      overflow:auto;scroll-behavior:smooth;padding:10px 12px calc(96px + var(--safe-bottom));
    }
    .scroll::-webkit-scrollbar{width:0}
    .searchRow{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    .searchBox{
      flex:1;height:40px;border-radius:999px;background:#fff;padding:0 12px;display:flex;align-items:center;gap:8px;
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .searchBox svg{width:17px;height:17px;stroke:#71839f;fill:none;stroke-width:2;stroke-linecap:round}
    .searchBox input{width:100%;font-size:13px;color:var(--text)}
    .filterBtn{
      height:40px;border-radius:999px;background:#fff;padding:0 13px;display:flex;align-items:center;gap:6px;font-weight:850;font-size:13px;color:var(--blue);
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .filterBtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .filterBadge{min-width:18px;height:18px;border-radius:999px;background:var(--blue);color:#fff;display:grid;place-items:center;padding:0 5px;font-size:11px;font-weight:950}.filterBadge:empty{display:none}

    .quickPanel{
      background:rgba(255,255,255,.78);border-radius:14px;padding:10px 10px 8px;box-shadow:var(--shadow);border:1px solid rgba(32,84,155,.07);margin-bottom:12px;
    }
    .quickTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .quickTitle{font-size:12px;color:#72829a;font-weight:800}.quickSort{font-size:12px;color:var(--blue);font-weight:900;display:flex;gap:3px;align-items:center}
    .leagueStrip{display:flex;gap:13px;overflow:auto;padding:0 0 2px;scrollbar-width:none}.leagueStrip::-webkit-scrollbar{display:none}
    .leagueItem{width:52px;flex:0 0 auto;display:grid;justify-items:center;gap:6px;color:#53677f;font-size:11px;font-weight:850}
    .leagueIcon{width:42px;height:42px;border-radius:13px;background:#f0f6ff;display:grid;place-items:center;color:#12213c;box-shadow:inset 0 0 0 1px rgba(47,125,246,.08)}
    .leagueIcon svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .leagueItem.active{color:var(--blue)}.leagueItem.active .leagueIcon{background:var(--blue);color:#fff;box-shadow:0 9px 20px rgba(47,125,246,.28)}
    .leagueItem span{white-space:nowrap;max-width:58px;overflow:hidden;text-overflow:ellipsis}
    .leagueItem.worldcup{width:78px;color:#344760}
    .leagueItem.worldcup .leagueIcon{width:54px;background:linear-gradient(135deg,#102747 0%,#2f7df6 62%,#f2c85e 100%);color:#fff;box-shadow:0 10px 22px rgba(22,62,120,.18),inset 0 0 0 1px rgba(255,255,255,.18)}
    .leagueItem.worldcup.active{color:#1f5fb9}.leagueItem.worldcup.active .leagueIcon{background:linear-gradient(135deg,#0f2342 0%,#1f68d8 58%,#f2c85e 100%);box-shadow:0 11px 24px rgba(47,125,246,.3),inset 0 0 0 1px rgba(255,255,255,.22)}
    .leagueItem.worldcup span:last-child{max-width:82px}
    .livePhaseStrip{display:flex;gap:8px;overflow:auto;margin:-2px -12px 10px;padding:0 12px 2px;scrollbar-width:none}.livePhaseStrip::-webkit-scrollbar{display:none}
    .phaseChip{height:36px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#52647c;padding:0 12px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:900;white-space:nowrap;flex:0 0 auto;position:relative}
    .phaseChip b{min-width:19px;height:19px;border-radius:999px;background:#edf5ff;color:var(--blue);display:grid;place-items:center;font-size:11px}.phaseChip.active{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 8px 18px rgba(47,125,246,.22)}.phaseChip.active b{background:rgba(255,255,255,.22);color:#fff}.phaseChip.extra.active{background:#c77716;border-color:#c77716;box-shadow:0 8px 18px rgba(199,119,22,.22)}.phaseChip.penalty.active{background:#d64758;border-color:#d64758;box-shadow:0 8px 18px rgba(214,71,88,.22)}

    .dateChips{display:flex;gap:8px;overflow:auto;margin:2px -12px 12px;padding:0 12px;scrollbar-width:none}.dateChips::-webkit-scrollbar{display:none}
    .dateChip{height:34px;border-radius:999px;background:#fff;box-shadow:inset 0 0 0 1px var(--line);color:#495b73;font-weight:850;font-size:13px;padding:0 13px;white-space:nowrap;flex:0 0 auto}.dateChip.active{background:var(--blue);color:#fff;box-shadow:0 8px 18px rgba(47,125,246,.25)}

    .leagueHeader{display:flex;align-items:center;justify-content:space-between;padding:6px 2px 9px;margin-top:3px}
    .leagueName{display:flex;align-items:center;gap:8px;font-weight:900;font-size:16px;letter-spacing:-.02em}
    .smallBall{width:25px;height:25px;border-radius:50%;background:#eef5ff;display:grid;place-items:center;color:#15243e;box-shadow:inset 0 0 0 1px rgba(47,125,246,.08)}
    .smallBall svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .leagueCount{height:25px;border-radius:999px;padding:0 9px;background:#eaf5ff;color:var(--blue);font-weight:900;font-size:12px;display:grid;place-items:center}

    .worldCupView{display:grid;gap:10px;padding-bottom:2px}
    .wcHero{position:relative;overflow:hidden;border-radius:16px;background:linear-gradient(135deg,#102747 0%,#1c5fb5 58%,#f0c667 100%);color:#fff;padding:13px;box-shadow:0 12px 28px rgba(18,67,132,.2)}
    .wcHero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.1) 1px,transparent 1px),linear-gradient(0deg,rgba(255,255,255,.08) 1px,transparent 1px);background-size:28px 28px;opacity:.28}
    .wcTop,.wcStats,.wcTitle,.wcGroupTabs,.wcSectionHead,.wcMatchTop,.wcActions{position:relative}
    .wcTop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .wcTitle{min-width:0}.wcTitle small{display:block;font-size:10px;font-weight:950;letter-spacing:.04em;color:rgba(255,255,255,.72);margin-bottom:2px}.wcTitle b{display:block;font-size:22px;line-height:1.05;font-weight:950;letter-spacing:-.02em}.wcTitle p{margin:6px 0 0;font-size:12px;line-height:1.45;color:rgba(255,255,255,.78);font-weight:750;max-width:230px}
    .wcBack{height:32px;border-radius:999px;padding:0 10px;background:rgba(255,255,255,.16);color:#fff;font-size:12px;font-weight:950;box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);white-space:nowrap;position:relative}
    .wcStats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
    .wcStat{min-height:48px;border-radius:12px;background:rgba(255,255,255,.15);box-shadow:inset 0 0 0 1px rgba(255,255,255,.16);padding:8px 9px}
    .wcStat b{display:block;font-size:17px;font-weight:950;line-height:1}.wcStat span{display:block;margin-top:5px;font-size:10px;color:rgba(255,255,255,.76);font-weight:850;white-space:nowrap}
    .wcGroupTabs{display:flex;gap:8px;overflow:auto;margin:0 -12px;padding:1px 12px 2px;scrollbar-width:none}.wcGroupTabs::-webkit-scrollbar{display:none}
    .wcGroupChip{height:34px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#52647c;padding:0 13px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:950;white-space:nowrap;flex:0 0 auto}
    .wcGroupChip b{font-size:11px;color:#8a9bb1}.wcGroupChip.active{background:#12294a;border-color:#12294a;color:#fff;box-shadow:0 8px 18px rgba(18,41,74,.18)}.wcGroupChip.active b{color:rgba(255,255,255,.72)}
    .wcBlock{display:grid;gap:8px}
    .wcSectionHead{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 0}.wcSectionHead b{font-size:15px;font-weight:950;color:#13243d}.wcSectionHead span{height:24px;border-radius:999px;padding:0 8px;background:#eef6ff;color:var(--blue);display:grid;place-items:center;font-size:11px;font-weight:950}
    .wcGroupCard,.wcMatchCard{background:#fff;border:1px solid rgba(22,52,96,.08);border-radius:14px;box-shadow:0 8px 24px rgba(14,60,130,.07);overflow:hidden}
    .wcGroupCard{padding:10px}.wcGroupCard + .wcGroupCard{margin-top:2px}
    .wcGroupTitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}.wcGroupTitle b{font-size:14px;font-weight:950}.wcGroupTitle span{font-size:11px;color:#7a8aa0;font-weight:900}
    .wcTable{display:grid;gap:0;border-radius:11px;background:#f8fbff;border:1px solid #e4edf8;overflow:hidden}
    .wcTableRow{display:grid;grid-template-columns:22px minmax(0,1fr) 24px 30px 34px 40px;align-items:center;gap:5px;min-height:36px;padding:0 8px;border-top:1px solid #e7eef8;font-size:12px;font-weight:850;color:#435670}
    .wcTableRow:first-child{border-top:0}.wcTableHead{min-height:30px;background:#eef6ff;color:#7a8aa0;font-size:10px;font-weight:950}.wcRank{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:#8a9bb1}.wcTeamCell{display:flex;align-items:center;gap:7px;min-width:0}.wcTeamCell strong{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wcAbbr{width:25px;height:25px;font-size:10px}.wcPts{font-weight:950;color:#11243e}.wcForm{height:20px;border-radius:999px;background:#fff;color:#75879f;display:grid;place-items:center;font-size:10px;font-weight:950}
    .wcMatchCard{padding:10px;margin-bottom:8px}
    .wcMatchTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}.wcMatchTop span{height:22px;border-radius:999px;background:#eef6ff;color:var(--blue);display:grid;place-items:center;padding:0 8px;font-size:11px;font-weight:950}.wcMatchTop b{font-size:12px;font-weight:950;color:#53677f;white-space:nowrap}
    .wcMatchTeams{display:grid;grid-template-columns:minmax(0,1fr) 46px minmax(0,1fr);align-items:center;gap:7px;margin-bottom:8px}.wcTeam{display:flex;align-items:center;gap:7px;min-width:0}.wcTeam.away{justify-content:flex-end;text-align:right}.wcTeam.away .wcTeamName{text-align:right}.wcTeamName{min-width:0}.wcTeamName b{display:block;font-size:13px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wcTeamName small{display:block;font-size:10px;color:#95a4b7;font-weight:850;margin-top:1px}.wcVs{height:32px;border-radius:999px;background:#f3f8ff;color:#2f6fca;display:grid;place-items:center;font-size:12px;font-weight:950}
    .wcMiniOdds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.wcOdd{min-height:44px;border-radius:10px;background:#eef6ff;border:1px solid rgba(47,125,246,.05);padding:5px;display:grid;place-items:center;color:#526a87;font-size:11px;font-weight:900;gap:2px;overflow:hidden}.wcOdd span{max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wcOdd b{font-size:14px;color:var(--blue);font-weight:950}.wcOdd.selected{background:var(--blue);border-color:var(--blue);color:#fff}.wcOdd.selected b{color:#fff}
    .wcActions{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}.wcVenue{min-width:0;color:#7c8ca2;font-size:11px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.wcMarketButton{height:30px;border-radius:999px;padding:0 10px;background:#12294a;color:#fff;font-size:12px;font-weight:950;white-space:nowrap}
    .wcNoData{background:#fff;border:1px dashed #d4deeb;border-radius:14px;padding:22px 12px;text-align:center;color:#71839a;font-size:12px;font-weight:850}.wcNoData b{display:block;color:#13243d;font-size:15px;margin-bottom:5px}.wcClearSearch{height:34px;border-radius:999px;background:#12294a;color:#fff;font-size:12px;font-weight:950;padding:0 13px;margin-top:12px}

    .matchCard{
      background:#fff;border-radius:14px;border:1px solid rgba(22,52,96,.08);box-shadow:0 8px 24px rgba(14,60,130,.07);padding:10px;margin-bottom:10px;position:relative;overflow:hidden;
    }
    .brand,.pillStatus,.iconBtn,.walletBtn,.mainTab,.dateChip,.quickSort,.phaseChip,.fav,.marketCount,.openMarkets,.detailLink,.sheetAction,.sheetClose,.segBtn,.backBtn,.wcBack,.wcGroupChip,.wcOdd,.wcMarketButton,.wcClearSearch{position:relative}
    .brand::before,.pillStatus::before,.iconBtn::before,.walletBtn::before,.mainTab::before,.dateChip::before,.quickSort::before,.phaseChip::before,.fav::before,.marketCount::before,.openMarkets::before,.detailLink::before,.sheetAction::before,.sheetClose::before,.segBtn::before,.backBtn::before,.wcBack::before,.wcGroupChip::before,.wcOdd::before,.wcMarketButton::before,.wcClearSearch::before{content:"";position:absolute;inset:-6px;border-radius:inherit}
    .matchTop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
    .leftMeta{display:flex;align-items:center;gap:6px;min-width:0}
    .fav{width:28px;height:28px;border-radius:9px;display:grid;place-items:center;color:#c2cbd8;background:#f8fbff;box-shadow:inset 0 0 0 1px rgba(50,80,130,.08);flex:0 0 auto}.fav.active{color:var(--orange);background:#fff7e8}
    .fav svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2;stroke-linejoin:round}.fav.active svg{fill:currentColor;stroke:currentColor}
    .liveTag{height:22px;border-radius:999px;padding:0 8px;display:flex;align-items:center;gap:5px;background:#fff0f1;color:var(--red);font-weight:900;font-size:11px;white-space:nowrap}.liveTag::before{content:"";width:5px;height:5px;background:var(--red);border-radius:50%;box-shadow:0 0 0 3px rgba(238,71,90,.12)}
    .liveTag.extra{background:#fff8e9;color:#b96b08}.liveTag.extra::before{background:var(--orange);box-shadow:0 0 0 3px rgba(242,153,24,.14)}
    .liveTag.penalty{background:#fff0f1;color:#d23d4e}.liveTag.penalty::before{background:#d64758;box-shadow:0 0 0 3px rgba(214,71,88,.14)}
    .prematchTag{height:22px;border-radius:999px;padding:0 8px;background:#fff8e9;color:#b96b08;font-weight:900;font-size:11px;white-space:nowrap;display:grid;place-items:center}
    .marketCount{font-size:12px;color:#6e82a0;font-weight:850;white-space:nowrap}.marketCount b{color:var(--blue);font-weight:900}
    .teamsScore{display:grid;grid-template-columns:minmax(0,1fr) 74px minmax(0,1fr);align-items:center;gap:8px;margin:2px 0 9px}
    .teamSide{display:flex;align-items:center;gap:7px;min-width:0}.teamSide.away{justify-content:flex-end}.teamSide.away .teamText{text-align:right}
    .abbr{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;font-weight:950;font-size:12px;letter-spacing:-.03em;flex:0 0 auto}.abbr.orange{background:#fff2d8;color:#bd7000}.abbr.blue{background:#e2f2ff;color:#1582c4}.abbr.green{background:#e3f9ee;color:#0d9a5f}.abbr.red{background:#ffe9ec;color:#d33b4a}.abbr.gold{background:#fff5dc;color:#b66a00}.abbr.flag{background:linear-gradient(135deg,#fff8df,#e52435 45%,#1eb35f 46%,#1eb35f);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.28)}

    closeSheets();
    renderAll(false);
    showToast('投注成功，已进入我的注单');
    setTimeout(()=>openSheet('#betsSheet'),500);
  }
  function renderFilters(){
    $('#statusChecks').innerHTML=[['live','常规滚球'],['extra','加时赛'],['penalty','点球大战'],['pre','早盘/未开赛']].map(([k,n])=>`<button class="checkItem ${state.filter.status.has(k)?'active':''}" data-fs="status:${k}"><span class="box"></span>${n}</button>`).join('');
    $('#leagueChecks').innerHTML=leagues.filter(l=>l.key!=='all').map(l=>`<button class="checkItem ${state.filter.leagues.has(l.key)?'active':''}" data-fs="leagues:${l.key}"><span class="box"></span>${l.name}</button>`).join('');
    $('#marketChecks').innerHTML=[['handicap','让球'],['total','大小'],['winner','独赢'],['half','半场'],['correct','波胆'],['stage','加时/点球']].map(([k,n])=>`<button class="checkItem ${state.filter.markets.has(k)?'active':''}" data-fs="markets:${k}"><span class="box"></span>${n}</button>`).join('');
    $$('#filterSheet [data-fs]').forEach(b=>b.addEventListener('click',()=>{const [group,key]=b.dataset.fs.split(':'); const set=state.filter[group]; if(set.has(key)) set.delete(key); else set.add(key); renderFilters();}));
    renderFilterBadge();
    renderTimeRanges();
  }
  function renderTimeRanges(){
    $$('#timeRanges [data-range]').forEach(b=>b.classList.toggle('active',b.dataset.range===state.filter.time));
  }
  function syncDateChips(){
    $$('#dateChips .dateChip').forEach(x=>x.classList.toggle('active',x.dataset.date===state.date));
  }
  function setActiveMainTab(tab){
    $$('#mainTabs .mainTab').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));
  }
  function syncBrowseChrome(){
    const inWorldCup=state.view==='worldcup';
    $('#dateChips').style.display=inWorldCup?'none':'';
    $('#searchInput').placeholder=inWorldCup?'搜索世界杯球队 / 分组':'搜索球队 / 联赛 / 国家';
  }
  function resetBrowseState(message='筛选已重置'){
    leaveWorldCup();
    state.tab='all'; state.league='all'; state.date='all'; state.query='';
    state.filter.status=defaultStatus(); state.filter.leagues=defaultLeagues(); state.filter.markets=defaultMarkets(); state.filter.time='today';
    $('#searchInput').value=''; setActiveMainTab('all'); syncDateChips(); renderAll(false); showToast(message);
  }
  function openDetail(id){
    rememberFocus();
    const m=getMatchById(id); if(!m) return;
    state.detailMatch=m; state.detailMarket='all'; state.detailInfo=null;
    $('#detailTitle').textContent=m.home+' vs '+m.away; $('#detailHome').textContent=m.home; $('#detailAway').textContent=m.away; $('#detailHomeAbbr').textContent=m.homeAbbr; $('#detailAwayAbbr').textContent=m.awayAbbr; $('#detailScore').textContent=m.score; $('#detailStatus').textContent=m.status.replace(' · ',' '); $('#detailStatus').className=scoreSubClass(m); $('#detailLeague').textContent=`${m.league} · ${phaseLabel(m)}`; $('#stagePanel').innerHTML=renderStagePanel(m); $('#detailHero').className=`detailHero ${m.phase?`phase-${m.phase}`:''}`.trim(); $('#detailHomeAbbr').className='abbr '+m.homeStyle; $('#detailAwayAbbr').className='abbr '+m.awayStyle;
    $('#detailFav').style.color=m.favorite?'var(--orange)':'#15243e'; $$('#marketTabs .marketTab').forEach(b=>b.classList.toggle('active',b.dataset.market==='all')); $$('#detailMenu [data-detail-info]').forEach(b=>b.classList.remove('active'));
    renderDetailInfoPanel(); renderDetailMarkets(); $('#detailScreen').classList.add('show'); syncLayerState(); focusLayer($('#detailScreen'));
  }
  function renderDetailInfoPanel(){
    const m=state.detailMatch; const panel=$('#detailInfoPanel');
    if(!m || !state.detailInfo){ panel.classList.remove('show'); panel.innerHTML=''; return; }
    const homeLine=['门将 林卓然','后卫 陈绍衡','中场 吴晋朗','前锋 梁志铭'];
    const awayLine=['门将 Rui Bento','后卫 A. Moyo','中场 N. Chirwa','前锋 Samu Kito'];
    const statSeed=m.id.charCodeAt(1);
    const homePoss=52 + (statSeed % 9), awayPoss=100-homePoss;
    const eventItems=m.phase==='penalty'
      ? [['120’',`${m.regulationScore||m.score} 进入点球大战，独赢与常规盘口已停止接单。`],['P3',`${m.home} 第三轮命中，点球大战胜者赔率下调。`],['P4',`${m.away} 即将主罚，下一罚盘口开放。`]]
      : m.phase==='extra'
        ? [['90’',`${m.regulationScore||m.score} 进入加时，常规时间盘口结算等待确认。`],['100’',`${m.home} 加时前场压迫，下一进球盘口短时升温。`],['105+1’','加时上半场补时，是否点球赔率开始收窄。']]
        : [['12’',`${m.home} 左路传中形成威胁，大小球盘口轻微上调。`],['28’',`${m.away} 中场抢断，独赢赔率短时回落。`],['HT',`${m.statusType==='live'?'等待下半场盘口刷新。':'首发名单将在开赛前更新。'}`]];
    const panels={
      stream:`<div class="infoCard"><div class="infoHead"><b>直播信号</b><span>延迟约 3 秒</span></div><div class="streamBox"><button class="playCircle" id="playStream" aria-label="播放直播"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5Z"/></svg></button><div><b>${m.home} vs ${m.away}</b><small>PM Live 1 · 高清动画直播 · 盘口同步</small></div></div><div class="chipRow"><button class="miniChip active" data-stream-line="PM Live 1">PM Live 1</button><button class="miniChip" data-stream-line="PM Live 2">PM Live 2</button><button class="miniChip" data-stream-line="动画直播">动画直播</button></div></div>`,
      lineup:`<div class="infoCard"><div class="infoHead"><b>首发阵容</b><span>${m.statusType==='live'?'已确认':'赛前预测'}</span></div><div class="lineupGrid"><div class="lineupSide"><h4>${m.home}</h4>${homeLine.map(x=>`<p>${x}</p>`).join('')}</div><div class="lineupSide"><h4>${m.away}</h4>${awayLine.map(x=>`<p>${x}</p>`).join('')}</div></div></div>`,
      stats:`<div class="infoCard"><div class="infoHead"><b>比赛数据</b><span>实时更新</span></div><div class="statRows"><div class="statLine"><span>${homePoss}%</span><div class="statBar"><div class="statHome" style="width:${homePoss}%"></div><div class="statAway" style="width:${awayPoss}%"></div></div><span>${awayPoss}%</span></div><div class="statLine"><span>${6+statSeed%5}</span><div class="statBar"><div class="statHome" style="width:58%"></div><div class="statAway" style="width:42%"></div></div><span>${4+statSeed%4}</span></div><div class="statLine"><span>${28+statSeed%12}</span><div class="statBar"><div class="statHome" style="width:54%"></div><div class="statAway" style="width:46%"></div></div><span>${23+statSeed%10}</span></div></div><div class="chipRow"><span class="miniChip active">控球率</span><span class="miniChip">射门</span><span class="miniChip">危险进攻</span></div></div>`,
      events:`<div class="infoCard"><div class="infoHead"><b>关键事件</b><span>${phaseLabel(m)}</span></div><div class="eventList">${eventItems.map(([min,text])=>`<div class="eventItem"><span class="eventMin">${min}</span><div class="eventText">${text}</div></div>`).join('')}</div></div>`
    };
    panel.innerHTML=panels[state.detailInfo] || '';
    panel.classList.add('show');
    panel.querySelectorAll('[data-stream-line]').forEach(b=>b.addEventListener('click',()=>{panel.querySelectorAll('[data-stream-line]').forEach(x=>x.classList.toggle('active',x===b)); showToast(`已切换到${b.dataset.streamLine}`);}));
    const play=$('#playStream'); if(play) play.addEventListener('click',()=>showToast('直播画面已就绪'));
  }
  function correctScoreOdds(m){
    const homeName=m.home.length>5?m.homeAbbr:m.home;
    const awayName=m.away.length>5?m.awayAbbr:m.away;
    return [
      {type:'correct', market:'波胆', label:`${homeName} 1-0`, price:6.40},
      {type:'correct', market:'波胆', label:`${homeName} 2-0`, price:8.80},
      {type:'correct', market:'波胆', label:`${homeName} 2-1`, price:7.60},
      {type:'correct', market:'波胆', label:'平局 0-0', price:9.20},
      {type:'correct', market:'波胆', label:'平局 1-1', price:6.90},
      {type:'correct', market:'波胆', label:'平局 2-2', price:13.50},
      {type:'correct', market:'波胆', label:`${awayName} 0-1`, price:9.80},
      {type:'correct', market:'波胆', label:`${awayName} 0-2`, price:18.00},
      {type:'correct', market:'波胆', label:`${awayName} 1-2`, price:14.20}
    ];
  }
  function renderDetailMarkets(){
    const m=state.detailMatch; if(!m) return;
    const groups=[
      {key:'handicap', title:'让球', layout:'', odds:[...m.odds.filter(o=>o.type==='handicap'), {type:'handicap', market:'让球', label:m.home+' -1.5', price:1.85}, {type:'handicap', market:'让球', label:m.away+' +1.5', price:1.95}, {type:'handicap', market:'让球', label:m.home+' -2', price:2.25}, {type:'handicap', market:'让球', label:m.away+' +2', price:1.63}]},
      {key:'total', title:'大小', layout:'', odds:[...m.odds.filter(o=>o.type==='total'), {type:'total', market:'大小', label:'大 3', price:2.25}, {type:'total', market:'大小', label:'小 3', price:1.63}, {type:'total', market:'大小', label:'大 2/2.5', price:1.60}, {type:'total', market:'大小', label:'小 2/2.5', price:2.30}]},
      {key:'winner', title:'独赢', layout:'three', odds:m.odds.filter(o=>o.type==='winner')},
      {key:'half', title:'半场', layout:'three', odds:[{type:'half', market:'半场独赢', label:m.home, price:1.67}, {type:'half', market:'半场独赢', label:'平局', price:2.75}, {type:'half', market:'半场独赢', label:m.away, price:8.50}]},
      {key:'correct', title:'波胆', layout:'score', odds:correctScoreOdds(m)},
      {key:'stage', title:stageMarketTitle(m), layout:'stage', odds:stageMarketOdds(m)},
      {key:'more', title:'更多盘口', layout:'', odds:[{type:'more', market:'角球', label:m.home+' 角球大 4.5', price:1.92}, {type:'more', market:'角球', label:m.away+' 角球小 4.5', price:1.88}, {type:'more', market:'罚牌', label:'全场罚牌大 3.5', price:1.76}, {type:'more', market:'罚牌', label:'全场罚牌小 3.5', price:2.04}, {type:'more', market:'下一进球', label:m.home+' 下一球', price:2.35}, {type:'more', market:'下一进球', label:m.away+' 下一球', price:3.10}]}
    ].filter(g=>state.detailMarket==='all'||state.detailMarket===g.key);
    $('#marketsScroll').innerHTML=groups.map(g=>`<section class="marketGroup"><div class="marketGroupHead"><div class="marketGroupTitle">${g.title}</div><div class="marketGroupCount">${g.odds.length} 项</div></div><div class="detailOddsGrid ${g.layout||''}">${g.odds.map(o=>{const key=pickKey(m.id,o); const sel=state.selected.some(p=>selectedKey(p)===key); return `<button class="detailOddsBtn ${sel?'selected':''}" data-detail-odd="${key}"><span>${o.label}</span><b class="mono">${oddsText(o.price)}</b></button>`}).join('')}</div><button class="expandMore">展开更多 <span>⌄</span></button></section>`).join('');
    $('#marketsScroll').querySelectorAll('[data-detail-odd]').forEach(b=>b.addEventListener('click',()=>toggleOdd(b.dataset.detailOdd)));
    $('#marketsScroll').querySelectorAll('.expandMore').forEach(b=>b.addEventListener('click',()=>showToast('已显示当前盘口组全部选项')));
  }
  function renderRecords(){
    let rows=state.records.filter(r=>state.recordTab==='all'||r.result===state.recordTab);
    $('#recordsList').innerHTML=rows.map(r=>`<article class="recordCard"><div class="recordTop"><div><b>${r.title}</b><p>${r.match}<br>${r.time}</p></div><div class="recordMoney"><strong class="mono">@ ${oddsText(r.odds)}</strong><small>${fmt(r.stake)}</small><span class="recordStatus ${r.result==='win'?'win':''}">${r.result==='running'?'进行中':r.result==='win'?'已赢':'已输'}</span></div></div></article>`).join('') || '<div class="emptyState" style="display:block"><b>暂无记录</b><p>当前筛选下没有注单。</p></div>';
  }
  function renderAll(scrollTop=true){ syncBrowseChrome(); renderMainTabBadges(); renderFilterBadge(); renderLeagues(); renderPhaseStrip(); renderList(); renderSlip(); renderDetailInfoPanel(); renderDetailMarkets(); renderFilters(); renderRecords(); renderWallet(); renderSettings(); renderRecharge(); if(scrollTop) $('#scroll').scrollTop=0; }

  $('#mainTabs').addEventListener('click',e=>{const b=e.target.closest('.mainTab'); if(!b) return; leaveWorldCup(); state.tab=b.dataset.tab; if(state.tab==='live') state.filter.status=liveStatus(); if(state.tab==='all') state.filter.status=defaultStatus(); setActiveMainTab(state.tab); renderAll();});
  $('#dateChips').addEventListener('click',e=>{const b=e.target.closest('.dateChip'); if(!b) return; leaveWorldCup(); state.date=b.dataset.date; $$('#dateChips .dateChip').forEach(x=>x.classList.toggle('active',x===b)); renderAll();});
  $('#searchInput').addEventListener('input',e=>{state.query=e.target.value; renderList();});
  $('#openFilter').addEventListener('click',()=>openSheet('#filterSheet')); $('#openFilter2').addEventListener('click',()=>openSheet('#filterSheet'));
  $('#timeRanges').addEventListener('click',e=>{const b=e.target.closest('[data-range]'); if(!b) return; state.filter.time=b.dataset.range; renderTimeRanges();});
  $('#resetFilter').addEventListener('click',()=>resetBrowseState());
  $('#resetEmpty').addEventListener('click',()=>resetBrowseState());
  $('#applyFilter').addEventListener('click',()=>{leaveWorldCup(); state.date=state.filter.time==='today'?'today':'all'; syncDateChips(); closeSheets(); renderAll(); showToast('已应用筛选');});
  $('#openSlip').addEventListener('click',()=>openSheet('#slipSheet')); $('#openSlipPrimary').addEventListener('click',()=>openSheet('#slipSheet')); $('#openSlipFromDetail').addEventListener('click',()=>openSheet('#slipSheet')); $('#detailBetBtn').addEventListener('click',()=>openSheet('#slipSheet'));
  $('#clearSlip').addEventListener('click',()=>{state.selected=[]; renderAll(false); showToast('投注单已清空');});
  $$('#slipSheet [data-slip-mode]').forEach(b=>b.addEventListener('click',()=>{state.slipMode=b.dataset.slipMode; $$('#slipSheet [data-slip-mode]').forEach(x=>x.classList.toggle('active',x===b)); renderSlipSummary();}));
  $('#submitBet').addEventListener('click',()=>{ if(!state.selected.length) return; if(state.settings.betConfirm){ renderConfirmSheet(); openSheet('#confirmSheet'); } else finalizeBet(); });
  $('#confirmBack').addEventListener('click',()=>openSheet('#slipSheet'));
  $('#confirmSubmit').addEventListener('click',finalizeBet);
  $('#settingsBtn').addEventListener('click',()=>openSheet('#settingsSheet')); $('#walletBtn').addEventListener('click',()=>openSheet('#walletSheet')); $('#brandBtn').addEventListener('click',()=>resetBrowseState('已返回全部赛事'));
  const settingCycles={oddsFormat:['欧洲盘','香港盘','马来盘'], marketSort:['热门优先','时间优先','联赛优先']};
  $$('[data-cycle-setting]').forEach(b=>b.addEventListener('click',()=>{const key=b.dataset.cycleSetting; const values=settingCycles[key]; const next=values[(values.indexOf(state.settings[key])+1)%values.length]; state.settings[key]=next; renderAll(false); showToast(`${b.childNodes[0].textContent.trim()}已切换为${next}`);}));
  $$('[data-toggle-setting]').forEach(b=>b.addEventListener('click',()=>{const key=b.dataset.toggleSetting; state.settings[key]=!state.settings[key]; renderSettings(); showToast(state.settings[key]?'已开启':'已关闭');}));
  $('#openBetsFromWallet').addEventListener('click',()=>{closeSheets(); setTimeout(()=>openSheet('#betsSheet'),180);});
  $('#openRecharge').addEventListener('click',()=>{renderRecharge(); openSheet('#rechargeSheet');});
  $('#rechargeInput').addEventListener('input',e=>{state.rechargeAmount=Math.max(0,Number(e.target.value||0)); renderRecharge();});
  $('#rechargeAmounts').addEventListener('click',e=>{const b=e.target.closest('[data-recharge-amount]'); if(!b) return; state.rechargeAmount=Number(b.dataset.rechargeAmount); renderRecharge();});
  $('#rechargeChannels').addEventListener('click',e=>{const b=e.target.closest('[data-channel]'); if(!b) return; state.rechargeChannel=b.dataset.channel; renderRecharge();});
  $('#submitRecharge').addEventListener('click',()=>{const amount=Number(state.rechargeAmount||0); if(amount<=0){showToast('请输入有效充值金额'); return;} state.walletBalance+=amount; closeSheets(); renderWallet(); showToast('充值已提交，余额已更新'); setTimeout(()=>openSheet('#walletSheet'),360);});
  $('#recordTabs').addEventListener('click',e=>{const b=e.target.closest('[data-record]'); if(!b) return; state.recordTab=b.dataset.record; $$('#recordTabs .segBtn').forEach(x=>x.classList.toggle('active',x===b)); renderRecords();});
  $('#closeDetail').addEventListener('click',closeDetail);
  $('#detailFav').addEventListener('click',()=>{if(!state.detailMatch)return; state.detailMatch.favorite=!state.detailMatch.favorite; const wc=worldCupMatches.find(x=>x.id===state.detailMatch.id); if(wc) wc.favorite=state.detailMatch.favorite; $('#detailFav').style.color=state.detailMatch.favorite?'var(--orange)':'#15243e'; renderMainTabBadges(); renderList(); showToast(state.detailMatch.favorite?'已加入收藏':'已取消收藏');});
  $('#refreshDetail').addEventListener('click',()=>{const btn=$('#refreshDetail'); btn.classList.add('spin'); setTimeout(()=>btn.classList.remove('spin'),800); showToast('盘口已刷新');});
  $('#detailMenu').addEventListener('click',e=>{const b=e.target.closest('[data-detail-info]'); if(!b) return; state.detailInfo=state.detailInfo===b.dataset.detailInfo?null:b.dataset.detailInfo; $$('#detailMenu [data-detail-info]').forEach(x=>x.classList.toggle('active',x.dataset.detailInfo===state.detailInfo)); renderDetailInfoPanel();});
  $('#marketTabs').addEventListener('click',e=>{const b=e.target.closest('[data-market]'); if(!b) return; state.detailMarket=b.dataset.market; $$('#marketTabs .marketTab').forEach(x=>x.classList.toggle('active',x===b)); renderDetailMarkets();});
  $('#wsBtn').addEventListener('click',()=>{const btn=$('#wsBtn'); btn.querySelector('.dot').style.background=btn.querySelector('.dot').style.background?'':'#16b978'; showToast('连接正常，盘口实时更新');});
  document.addEventListener('keydown',e=>{ trapFocus(e); if(e.key==='Escape'){ if($('#detailScreen').classList.contains('show')) closeDetail(); else closeSheets(); }});
  window.addEventListener('resize',syncLayerState);
  let ws=0; setInterval(()=>{$('#wsText').textContent='WS · '+(ws++%6)+'s';},1000);
  setInterval(()=>{const btns=$$('.oddsBtn:not(.selected), .detailOddsBtn:not(.selected)'); if(btns.length){const b=btns[Math.floor(Math.random()*btns.length)]; b.classList.add('changed'); setTimeout(()=>b.classList.remove('changed'),1600);}},6500);
  syncLayerState(); renderAll(false);
})();
</script>
</body>
</html>
