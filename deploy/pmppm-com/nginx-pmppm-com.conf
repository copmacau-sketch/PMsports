# nginx site for pmppm.com.
#
# As of 2026-05-23 the public face of pmppm.com is the Crown-gold sportsbook
# served by PHP-FPM on :8080. The previous /sports Next.js prototype + Go
# backend + FastAPI stack is kept reachable at its old paths for internal
# tooling but is no longer the default landing.
#
# Routing summary (top wins, ^~ prefix beats regex):
#   GET /                 → Crown-gold /index.html (legacy login UI)
#   GET /index.html       → Crown-gold /index.html
#   GET /h5/*             → Crown-gold H5 SPA + assets
#   ANY /api/auth/*       → Crown-gold PHP api_v2.php
#   ANY /api/credit/*     → Crown-gold PHP
#   ANY /api/exchange*    → Crown-gold PHP
#   ANY /api/external/*   → Crown-gold PHP (odds-api passthrough)
#   ANY /api/pmppm/*      → Crown-gold PHP (place-bet / my-bets)
#   GET /health           → Crown-gold PHP
#   ANY /api/(user|agent|...) → Go backend (legacy, inactive as of 2026-05-23)
#   GET /sports*          → Next.js (legacy)
#   GET /                 (catch-all) → Next.js (legacy)
#
# All HTTPS is terminated here; backends are plain HTTP on loopback.

upstream pmppm_com_next {
    server 127.0.0.1:3003;
    keepalive 8;
}

upstream pmppm_com_api {
    server 127.0.0.1:8787;
    keepalive 16;
}

upstream pmppm_com_go {
    server 127.0.0.1:8081;
    keepalive 16;
}

# Crown-gold sportsbook (PHP-FPM via nginx site on :8080). Talks plain HTTP
# on loopback. Public TLS is terminated by the pmppm.com server block.
upstream pmppm_com_crown {
    server 127.0.0.1:8080;
    keepalive 16;
}

# ─── /api/external/events* micro-cache (anti-thundering-herd) ───────────────
# The board + markets endpoints are served by the SINGLE-process FastAPI worker
# and are comparatively expensive (full-board fetch parses ~400 /dev/shm
# goalserve snapshots into ~460KB JSON). When CloudFlare restarts its WebSocket
# proxy it drops every connected browser at once; they all reconnect and
# re-poll /events in lockstep, saturating the one GIL-bound worker so even
# /health + WS keepalive pings block → 504. A 5s micro-cache with
# proxy_cache_lock collapses that burst onto ONE upstream request every few
# seconds and serves everyone else from cache (stale-while-revalidate on
# refresh / upstream error). Display-only: PHP place-bet validation calls
# 127.0.0.1:8787 directly and never traverses this cache.
proxy_cache_path /var/cache/nginx/cg_events levels=1:2 keys_zone=cg_events_cache:10m max_size=200m inactive=60s use_temp_path=off;

# ─── Rate limiting: brute-force defence on /api/auth/login ──────────────────
# Behind Cloudflare, $binary_remote_addr is the CF edge IP — using it as
# the limit key would throttle every user behind the same CF edge as one
# bucket. We prefer the real client IP from `CF-Connecting-IP` whenever
# present, falling back to peer address only if the request didn't come
# through CF (direct origin hit, internal probe, etc.).
map $http_cf_connecting_ip $cg_login_limit_key {
    default       $binary_remote_addr;
    "~^.+$"       $http_cf_connecting_ip;
}
# 20 attempts/min sustained, burst of 10 (no delay) absorbs legitimate
# typo-retry patterns. After burst is consumed, requests over 20/min get
# HTTP 429. 10m zone = ~160k unique keys tracked.
limit_req_zone $cg_login_limit_key zone=cg_login:10m rate=20r/m;
limit_req_status 429;

# Odds-API.io WebSocket bridge — owned by the FastAPI process via
# crown-explorer/backend/app/oddsapi_ws.py.  It maintains the single
# allowed upstream connection to wss://api.odds-api.io/v3/ws, fans out
# to browser /api/external/ws subscribers, and writes /dev/shm/oddsapi_live
# which the Crown PHP api_v2.php reads for in-play (滚球) main_odds.
# (Pre-2026-05-24 a separate Node daemon owned this; it is now retired.)

server {
    listen 80;
    listen [::]:80;
    server_name pmppm.com www.pmppm.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    server_name pmppm.com www.pmppm.com;

    client_max_body_size 8m;

    # ─── Security: global response headers ─────────────────────────────
    # nginx's `add_header` is NOT inherited from parent scope once a child
    # `location` declares any of its own. Most of our locations set
    # `add_header Cache-Control ...`, so server-scope security headers get
    # silently dropped. Pattern: every location that declares an add_header
    # also `include`s snippets/cg-security-headers.conf, which re-emits
    # the 5 security headers at location scope. The server-scope copy
    # below is the fallback for locations that set NO add_header at all.
    include snippets/cg-security-headers.conf;

    # ─── Cloudflare-only allow-list (OPT-IN) ───────────────────────────
    # Enable this block ONLY if the public DNS for pmppm.com points at
    # Cloudflare (orange-cloud) and no direct-to-origin traffic is
    # legitimate. Refresh the IP ranges quarterly from:
    #   https://www.cloudflare.com/ips-v4
    #   https://www.cloudflare.com/ips-v6
    # If you turn this on while CF is still proxying via a bastion that
    # is NOT in this list, you will lock yourself out — verify with
    # `curl --resolve pmppm.com:443:<origin-ip>` from a CF egress first.
    #
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 131.0.72.0/22;
    # set_real_ip_from 2400:cb00::/32;
    # set_real_ip_from 2606:4700::/32;
    # set_real_ip_from 2803:f800::/32;
    # set_real_ip_from 2405:b500::/32;
    # set_real_ip_from 2405:8100::/32;
    # set_real_ip_from 2a06:98c0::/29;
    # set_real_ip_from 2c0f:f248::/32;
    # real_ip_header CF-Connecting-IP;
    # real_ip_recursive on;
    #
    # # Reject any request whose source IP is NOT a Cloudflare edge.
    # # `$realip_remote_addr` is the original peer; `$remote_addr` is the
    # # rewritten one. We compare on the original peer.
    # if ($realip_remote_addr !~ "^(173\.245\.48\.|103\.21\.244\.|103\.22\.200\.|103\.31\.4\.|141\.101\.|108\.162\.|190\.93\.240\.|188\.114\.|197\.234\.240\.|198\.41\.|162\.158\.|104\.16\.|104\.17\.|104\.18\.|104\.19\.|104\.20\.|104\.21\.|104\.22\.|104\.23\.|104\.24\.|104\.25\.|104\.26\.|104\.27\.|172\.64\.|172\.65\.|172\.66\.|172\.67\.|172\.68\.|172\.69\.|172\.70\.|172\.71\.|131\.0\.72\.|127\.0\.0\.1)$") {
    #     return 444;
    # }

    # ─── Crown-gold landing ────────────────────────────────────────────
    # `^~` makes nginx skip later regex locations once this prefix matches.
    # We rewrite "/" to "/index.html" because the Crown-gold nginx on :8080
    # uses `index index.html` only for that explicit filename.

    location = / {
        proxy_pass http://pmppm_com_crown/index.html;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store" always;
        include snippets/cg-security-headers.conf;
        include snippets/cg-csp-login.conf;
    }

    location = /index.html {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store" always;
        include snippets/cg-security-headers.conf;
        include snippets/cg-csp-login.conf;
    }

    location ^~ /h5/ {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        # SPA CSP (looser than login page — see snippet header for why).
        # Adding any `add_header` in a location breaks inheritance from
        # server scope, so we must also re-emit security headers here.
        include snippets/cg-security-headers.conf;
        include snippets/cg-csp-spa.conf;
    }

    # ─── Crown-gold legacy back-office sub-sites ─────────────────────────
    # /d0/      报表层  (D0 总公司报表/注单查询)
    # /agents/  代理层  (CO/SU/AG 工作台)
    # /admin/   后台    (公司/超管 ADS/AD)
    # All three live under wwwroot_F5PEa/application/{d0,agents,admin}/ on
    # the Crown-gold :8080 vhost. Without explicit prefixes here they'd
    # fall through to the Next.js catch-all and 404. We also handle the
    # missing-trailing-slash variant explicitly so we don't get bounced
    # to Next.js by the proxy on a 301 round-trip.
    location ^~ /d0/      { proxy_pass http://pmppm_com_crown; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_pass_header Set-Cookie; }
    location ^~ /agents/  { proxy_pass http://pmppm_com_crown; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_pass_header Set-Cookie; }
    location ^~ /admin/   { proxy_pass http://pmppm_com_crown; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; proxy_pass_header Set-Cookie; }
    location = /d0        { return 301 /d0/; }
    location = /agents    { return 301 /agents/; }
    location = /admin     { return 301 /admin/; }
    # /static/ is shared between member, d0, agents, admin (CSS/JS/images).
    location ^~ /static/  { proxy_pass http://pmppm_com_crown; }
    # Crown-gold's /d0/, /agents/, /admin/ pages inline their CSS bundles
    # via PHP (vendor/contorller/{site}/SetHtml.php). Those CSS rules use
    # relative `url(../../images/control/*.svg)` references that, once
    # inlined into the document at `/admin/`, resolve against the document
    # URL — i.e. they request `/images/control/*.svg` and `/js/index.js`
    # at the site root, NOT under `/static/` or `/admin/`. Without these
    # explicit prefixes nginx routes the bare `/images/*.svg` to the
    # regex `~* \.svg$` block below → pmppm_com_next (legacy Next.js on
    # :3003) → 404 → admin/d0/agents UIs render with all icons missing.
    location ^~ /images/  { proxy_pass http://pmppm_com_crown; }
    location ^~ /js/      { proxy_pass http://pmppm_com_crown; }

    # All Crown-gold API surfaces — login / session / credit / FX / odds
    # passthrough. These must come *before* the legacy regex block below
    # so the prefix match wins over the Go backend route.
    #
    # /api/auth/login gets its own exact-match block first so the rate
    # limit only applies to credential submission, NOT to /api/auth/me
    # (which runs on every page load and would otherwise self-throttle
    # legitimate browsing). nginx location priority: `=` beats `^~`.
    location = /api/auth/login {
        limit_req zone=cg_login burst=10 nodelay;
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    location ^~ /api/auth/ {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    location ^~ /api/credit/ {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    location ^~ /api/exchange {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
    }
    # /api/external/* split:
    #
    #   /api/external/leagues          → FastAPI  (odds-api.io snapshot)
    #   /api/external/events*          → FastAPI  (odds-api.io snapshot — replaces
    #                                              the previous PHP path so we get
    #                                              fresh in-play odds for free)
    #   /api/external/outrights        → FastAPI  (the-odds-api.com proxy: FIFA
    #                                              WC / NBA / NFL etc. winners)
    #   /api/external/ws               → FastAPI  (odds-api.io WS bridge)
    #   /api/external/match/*          → PHP      (api-sports.io widgets:
    #                                              stream / tracker / statistics /
    #                                              events / h2h / standings)
    #   /api/external/* (catch-all)    → PHP      (legacy / future PHP routes)
    #
    # `^~` longest-prefix wins, so the FastAPI rules below MUST be more
    # specific than the trailing PHP catch-all. Because all the FastAPI
    # routes share a longer common prefix with their respective targets,
    # nginx's prefix-match selection is unambiguous.
    location ^~ /api/external/leagues {
        proxy_pass http://pmppm_com_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    location ^~ /api/external/events {
        proxy_pass http://pmppm_com_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Micro-cache (see proxy_cache_path cg_events above): one upstream
        # request per 5s per URI; concurrent callers wait on the lock or get
        # the stale copy instead of stampeding the single FastAPI worker.
        proxy_cache cg_events_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 5s;
        proxy_cache_lock on;
        proxy_cache_lock_age 30s;
        proxy_cache_lock_timeout 30s;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_ignore_headers Cache-Control Expires;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=0, s-maxage=5, stale-while-revalidate=30" always;
        include snippets/cg-security-headers.conf;
    }
    location ^~ /api/external/outrights {
        proxy_pass http://pmppm_com_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    # Team / league / player logo proxy (FastAPI routers/external.py
    # `logo_proxy`).  Disk-cached PNGs from Goalserve's logotips CDN, served
    # with a long immutable cache.  MUST be its own FastAPI prefix — without
    # it `/api/external/logos/...` falls through to the PHP catch-all below
    # (api_v2.php), which has no logos route and 404s, so the H5 crest <img>
    # fails its onerror and team badges/flags degrade to initials circles.
    location ^~ /api/external/logos {
        proxy_pass http://pmppm_com_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        include snippets/cg-security-headers.conf;
    }
    # World Cup overview (FastAPI routers/external.py `world_cup_overview`):
    # group standings + top scorers for the standalone /h5/worldcup.html page.
    # MUST be its own FastAPI prefix — otherwise it falls through to the PHP
    # catch-all below (api_v2.php), which has no /worldcup route and 404s.
    location ^~ /api/external/worldcup {
        proxy_pass http://pmppm_com_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=0, s-maxage=60, stale-while-revalidate=300" always;
        include snippets/cg-security-headers.conf;
    }
    # NOTE 2026-05-24: /api/external/sfs/ was briefly routed here to expose
    # Crown's full sfs_match outright catalog.  Retired because the source
    # table is a frozen March 2026 dump (no live upstream).  Any caller
    # now falls through to the PHP catch-all below and gets a 404.
    location ^~ /api/external/ws {
        # FastAPI WS bridge (oddsapi_ws.py inside pmppm-com-api.service).
        proxy_pass http://pmppm_com_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # No buffering: WS frames must reach the client immediately.
        proxy_buffering off;
    }
    # Match widget passthrough — stream / tracker / statistics / events /
    # h2h / standings still live in api_v2.php (call api-sports.io with
    # 30s on-disk cache; FastAPI doesn't expose them yet).
    location ^~ /api/external/match/ {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    # Catch-all for any other /api/external/* path (e.g. future PHP-only
    # routes). Falls through to Crown-gold PHP.
    location ^~ /api/external/ {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    # /api/pmppm/place-bet + /api/pmppm/my-bets are implemented by
    # api_v2.php (the legacy Go backend on :8081 has been retired). Without
    # this prefix block the regex below would catch /api/pmppm/* first and
    # return 502 — which surfaces in the browser as "Failed to fetch"
    # because the 502 response carries no Access-Control-Allow-* headers.
    location ^~ /api/pmppm/ {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    # /api/bets — Crown-style bet rows for the H5 "我的·订单与战绩" page.
    # Hits db_client.bet (same table used by /d0/, /admin/, /agents/) via
    # api_v2.php. Must be an explicit prefix so it doesn't fall through to
    # the catch-all Next.js proxy below (which would 404).
    location = /api/bets {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    # /api/settle?key=cron2026 — settle_bets.php entrypoint (HTTP variant).
    location = /api/settle {
        proxy_pass http://pmppm_com_crown;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }
    location = /health {
        proxy_pass http://pmppm_com_crown;
        access_log off;
    }

    # ─── Legacy prototypes (unchanged) ─────────────────────────────────
    # Long-cache static assets
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff2|woff|ttf|eot|webp|avif)$ {
        proxy_pass http://pmppm_com_next;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
        include snippets/cg-security-headers.conf;
    }

    location /_next/static/ {
        proxy_pass http://pmppm_com_next;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include snippets/cg-security-headers.conf;
    }

    # Legacy Go backend (user / agent / referral / positions / etc.) —
    # kept for /sports prototype tooling. /api/auth + /api/credit are
    # NOT in this list anymore because the prefix locations above
    # already redirected them to Crown-gold.
    location ~ ^/api/(user|agent|referral|positions|quote-buy|quote-sell|bet-promise|bet-promises|dashboard-stats|dashboard/bets|admin)(/|$) {
        proxy_pass http://pmppm_com_go;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
    }

    # /sports/quote/goalserve — operator data-capture page served by the
    # FastAPI app (routers/quote.py).  It captures the Goalserve WS
    # (/api/external/ws) + HTTP (/api/external/events) feeds in the browser
    # and exports timestamped CSV.  Exact-match so it wins over the /sports
    # 301 redirects and the catch-all Next.js proxy below.
    location = /sports/quote/goalserve {
        proxy_pass http://pmppm_com_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        include snippets/cg-security-headers.conf;
        include snippets/cg-csp-spa.conf;
    }

    # /sports → /h5/sports.html (canonical Crown-gold H5 entry).
    # The Next.js standalone is still running on $pmppm_com_next and serves
    # the same page, but post-2026-05-23 the H5 static export is the
    # authoritative bundle (it's the one Crown-gold's PHP login page
    # redirects to after auth, and the one we keep iterating on).  301
    # so the browser caches the hop and bookmarks update automatically.
    location = /sports  { return 301 /h5/sports.html; }
    location = /sports/ { return 301 /h5/sports.html; }

    # Everything else → Next.js (the /sports prototype etc.)
    location / {
        proxy_pass http://pmppm_com_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=30, stale-while-revalidate=60" always;
        include snippets/cg-security-headers.conf;
        include snippets/cg-csp-spa.conf;
    }

    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    ssl_certificate     /etc/letsencrypt/live/pmppm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmppm.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    # HSTS + other security headers are declared at the top of this server
    # block so they survive nginx's add_header inheritance rules across the
    # location tree. Do NOT add another `add_header` here — it would shadow
    # the entire set.
}
