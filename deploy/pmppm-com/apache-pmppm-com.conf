# Apache 2.4 reverse-proxy site for pmppm.com (PmPm v4 H5 prototype).
#
# Co-resides with Crown-Gold's :8080 site on 3.25.180.205 — adds :80 and
# :443 vhosts dedicated to pmppm.com, leaving 8080 untouched.
#
# Upstream services (already configured in deploy/pmppm-com/*.service):
#   127.0.0.1:3003  Next.js standalone (web)
#   127.0.0.1:8787  FastAPI (crown-explorer external + odds api)
#   127.0.0.1:8081  Go backend (auth / credit / agent / positions)
#
# certbot --apache injects the SSLCertificateFile lines in a separate
# `pmppm-com-le-ssl.conf` so we keep this file plain HTTP-aware. The
# 443 vhost block below is filled in by certbot on first run.

<VirtualHost *:80>
    ServerName  pmppm.com
    ServerAlias www.pmppm.com

    # Let's Encrypt http-01 challenge: must be served as plain HTTP and
    # must not redirect. certbot --apache writes tokens to /var/www/html
    # by default, so we keep that as the docroot for ACME paths.
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Require all granted
    </Directory>

    # Everything else → permanent redirect to https. The /.well-known
    # exception above takes precedence because it's a more specific
    # location (Apache evaluates RewriteCond order).
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^/(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]

    ErrorLog  ${APACHE_LOG_DIR}/pmppm-com-error.log
    CustomLog ${APACHE_LOG_DIR}/pmppm-com-access.log combined
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName  pmppm.com
    ServerAlias www.pmppm.com

    # ---- Static asset cache (Next.js) -------------------------------------
    # _next/static is content-hashed → 1y immutable.
    <LocationMatch "^/_next/static/">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </LocationMatch>

    # ---- WebSocket: external odds push ------------------------------------
    # Must come before generic /api/external/ proxy (Apache picks the most
    # specific Location). Uses ws:// against the FastAPI upstream.
    <Location /api/external/ws>
        ProxyPass        ws://127.0.0.1:8787/api/external/ws
        ProxyPassReverse ws://127.0.0.1:8787/api/external/ws
    </Location>

    # ---- FastAPI (external + odds-api) ------------------------------------
    <Location /api/external/>
        ProxyPass        http://127.0.0.1:8787/api/external/
        ProxyPassReverse http://127.0.0.1:8787/api/external/
        Header set Cache-Control "no-store, no-cache, must-revalidate"
    </Location>
    <Location /health>
        ProxyPass        http://127.0.0.1:8787/health
        ProxyPassReverse http://127.0.0.1:8787/health
    </Location>

    # ---- Go backend: auth / credit / agent / positions / pmppm ------------
    # mod_proxy doesn't accept regex in <Location>, so we list the prefixes
    # explicitly. ProxyPassMatch handles the regex with a single rule.
    ProxyPassMatch ^/api/(auth|user|credit|agent|referral|positions|quote-buy|quote-sell|bet-promise|bet-promises|dashboard-stats|dashboard/bets|admin|pmppm)(/.*)?$ http://127.0.0.1:8081/api/$1$2
    <LocationMatch "^/api/(auth|user|credit|agent|referral|positions|quote-buy|quote-sell|bet-promise|bet-promises|dashboard-stats|dashboard/bets|admin|pmppm)(/|$)">
        Header set Cache-Control "no-store, no-cache, must-revalidate"
    </LocationMatch>

    # ---- Root redirect → /sports ------------------------------------------
    RewriteEngine On
    RewriteRule ^/$ /sports [R=301,L]

    # ---- Everything else → Next.js ----------------------------------------
    # Proxy with WebSocket upgrade support (HMR / future live features).
    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        /api !
    ProxyPass        /health !
    ProxyPass        / http://127.0.0.1:3003/ upgrade=websocket
    ProxyPassReverse / http://127.0.0.1:3003/

    # Pass real client info to the upstreams.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    ErrorLog  ${APACHE_LOG_DIR}/pmppm-com-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/pmppm-com-ssl-access.log combined

    SSLEngine on
    SSLCertificateFile      /etc/letsencrypt/live/pmppm.com/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/pmppm.com/privkey.pem
    # Mozilla "intermediate" profile (Apache 2.4 + OpenSSL >=1.1.1).
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
</VirtualHost>
</IfModule>
