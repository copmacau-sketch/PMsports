; Crown-Gold (wwwroot_F5PEa) — 强制美东时区
; 部署位置（mod_php）   : /etc/php/7.4/apache2/conf.d/99-crown-gold-timezone.ini
; 部署位置（CLI 采集器）: /etc/php/7.4/cli/conf.d/99-crown-gold-timezone.ini
;
; 部署文档要求：服务器时间 = 美东时间（比北京慢 12h）。这里用 IANA
; 名 America/New_York，PHP 内置 DST 转换，等价于文档里的 US/Eastern。
date.timezone = America/New_York

; 长时间运行的采集脚本（data180.php 用 set_time_limit(0)）需要内存与
; socket 容忍。仅在 CLI 起作用对 Apache 无副作用，但放这里方便统一。
default_socket_timeout = 60
