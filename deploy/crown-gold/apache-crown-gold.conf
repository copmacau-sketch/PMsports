# ============================================================================
# DEPRECATED 2026-05-26 — Apache no longer serves Crown-Gold.
#
# Production (`3.25.180.205:8080`) is now served by **nginx + php7.4-fpm**;
# see ./nginx-crown-gold.conf for the live config. Apache was stopped and
# `systemctl disable`d on 2026-05-26 because:
#   1. nginx already terminates :80/:443 for pmppm.com and is the chosen
#      web server going forward.
#   2. Letting Apache co-exist created port-binding races on restart
#      (Apache tried :80 even though only :8080 vhost was enabled, fighting
#      nginx). nginx took :8080 first; Apache started failing.
#   3. mod_php → php-fpm migration also means env-based DB creds via
#      systemd `EnvironmentFile=/etc/cg-db.env` work cleanly without
#      Apache `SetEnv` plumbing.
#
# Kept here for historical reference — DO NOT install / a2ensite. If you
# need to roll back to Apache, start by re-enabling :8080 in nginx-only
# mode pointing at a 2nd backend, then carefully reverse step 1.
# ============================================================================
#
# Apache 2.4 vhost for Crown-Gold (wwwroot_F5PEa) on 3.25.180.205:8080
#
# 部署文档原方案是 4 个二级域名（member / d0 / agents / admin）。
# 3.25.180.205 当前没有域名，所以改成"同端口 + 4 个路径前缀"：
#
#   http://3.25.180.205:8080/         → application/member   (前台)
#   http://3.25.180.205:8080/d0/      → application/d0       (报表)
#   http://3.25.180.205:8080/agents/  → application/agents   (代理)
#   http://3.25.180.205:8080/admin/   → application/admin    (后台)
#
# bdata（采集脚本）不通过 Apache 暴露，由 systemd 后台跑（见 collector/）。
#
# 历史安装路径：/etc/apache2/sites-available/crown-gold.conf
# 历史启用命令: a2ensite crown-gold && systemctl reload apache2

<VirtualHost *:8080>
    ServerName 3.25.180.205
    ServerAdmin webmaster@localhost

    # 前台是默认根，所有未匹配的请求都落到这里
    DocumentRoot /home/ubuntu/crown-gold/wwwroot_F5PEa/application/member
    RedirectMatch 302 ^/index\.php$ /h5/sports.html

    <Directory /home/ubuntu/crown-gold/wwwroot_F5PEa/application/member>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

    # ---- /d0  → 报表 -------------------------------------------------------
    Alias /d0 /home/ubuntu/crown-gold/wwwroot_F5PEa/application/d0
    <Directory /home/ubuntu/crown-gold/wwwroot_F5PEa/application/d0>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

    # ---- /agents  → 代理 (登 1/2/3) ----------------------------------------
    Alias /agents /home/ubuntu/crown-gold/wwwroot_F5PEa/application/agents
    <Directory /home/ubuntu/crown-gold/wwwroot_F5PEa/application/agents>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

    # ---- /admin  → 后台 (公司/超管) ----------------------------------------
    Alias /admin /home/ubuntu/crown-gold/wwwroot_F5PEa/application/admin
    <Directory /home/ubuntu/crown-gold/wwwroot_F5PEa/application/admin>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.html index.php
    </Directory>

    # ---- /static (CSS/JS/images 共享资源) ----------------------------------
    Alias /static /home/ubuntu/crown-gold/wwwroot_F5PEa/static
    <Directory /home/ubuntu/crown-gold/wwwroot_F5PEa/static>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # ---- vendor / bdata 通过 web 完全屏蔽 ----------------------------------
    # vendor/mysql/config.php 含 DB 密码；bdata 含会员账号，绝对不可暴露。
    # 之前版本的 crown-gold.conf 把 /vendor 暴露了 — 这里显式 deny 修复。
    <DirectoryMatch "^/home/ubuntu/crown-gold/wwwroot_F5PEa/(vendor|application/bdata)(/|$)">
        Require all denied
    </DirectoryMatch>
    <LocationMatch "^/(vendor|bdata)(/|$)">
        Require all denied
    </LocationMatch>

    # ---- PHP handler -------------------------------------------------------
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>

    # ---- gzip --------------------------------------------------------------
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript
        AddOutputFilterByType DEFLATE application/javascript application/x-javascript application/json
        AddOutputFilterByType DEFLATE application/xml application/xhtml+xml
        DeflateCompressionLevel 6
    </IfModule>
    <IfModule mod_headers.c>
        <LocationMatch "^/(index\.html)?$">
            Header set Cache-Control "no-store"
        </LocationMatch>
        <LocationMatch "^/h5/_next/static/">
            Header set Cache-Control "public, max-age=31536000, immutable"
        </LocationMatch>
        <LocationMatch "^/h5/.*\.html$">
            Header set Cache-Control "public, max-age=60"
        </LocationMatch>
    </IfModule>

    # ---- 日志 --------------------------------------------------------------
    LogLevel warn
    ErrorLog  ${APACHE_LOG_DIR}/crown-gold-error.log
    CustomLog ${APACHE_LOG_DIR}/crown-gold-access.log combined
</VirtualHost>

# 全局 keep-alive (与原配置一致)
KeepAlive On
MaxKeepAliveRequests 200
KeepAliveTimeout 5

# ports.conf 必须含: Listen 8080
