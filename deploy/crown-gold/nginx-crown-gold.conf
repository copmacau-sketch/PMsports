# nginx vhost for Crown-Gold (wwwroot_F5PEa) on 3.25.180.205:8080.
#
# 取代之前的 Apache 配置（apache-crown-gold.conf）。Apache 由 nginx 全面接管
# 后 systemctl disable apache2 即可。PHP 通过 php7.4-fpm Unix socket 调用，
# 老 mod_php 不再使用。
#
#   http://3.25.180.205:8080/         → application/member  (前台 / H5)
#   http://3.25.180.205:8080/d0/      → application/d0      (报表)
#   http://3.25.180.205:8080/agents/  → application/agents  (代理)
#   http://3.25.180.205:8080/admin/   → application/admin   (后台)
#   http://3.25.180.205:8080/static/  → wwwroot_F5PEa/static (共享资源)
#
# /api/(external|auth|pmppm|credit|exchange)/* + /api/(exchange-rates|settle|
# bets) + /health 全部路由到 application/member/api_v2.php (替代 .htaccess
# 中的 RewriteRule)。
#
# 安装路径：/etc/nginx/sites-available/crown-gold
# 启用：    ln -sfn ../sites-available/crown-gold /etc/nginx/sites-enabled/
# 测试：    nginx -t && systemctl reload nginx

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /home/ubuntu/crown-gold/wwwroot_F5PEa/application/member;
    index index.html index.php;

    client_max_body_size 8m;
    access_log /var/log/nginx/crown-gold-access.log;
    error_log  /var/log/nginx/crown-gold-error.log warn;

    # 这台 vhost 跑在 :8080，只接前面的 nginx (pmppm.com) 反代过来的流量。
    # nginx 默认会把 `return 302 /path` 改写成绝对 URL（取自当前 server_name
    # + listening port），结果 Location 头变成 http://pmppm.com:8080/...
    # 既泄露了内部端口，又掉到了 http。关掉它后 Location 保持相对路径，
    # 浏览器自然按当前页面（https://pmppm.com/）做相对解析。
    absolute_redirect off;

    # ---- 安全：禁止访问敏感目录 -----------------------------------------
    # vendor 含 db 密码、bdata 含会员账号。
    location ~ ^/(vendor|bdata)(/|$) { return 403; }
    location ~ /\.(?!well-known) { return 403; }

    # ---- 兼容旧链接：/index.php → /h5/sports.html -----------------------
    location = /index.php {
        return 302 /h5/sports.html$is_args$args;
    }

    # ---- Odds-API.io WebSocket bridge (in-play 滚球 push) ----------------
    # FastAPI bridge on 127.0.0.1:8787 (oddsapi_ws.py inside
    # pmppm-com-api.service).  MUST come before the generic /api/external/
    # regex below so the prefix match wins and we don't rewrite to
    # api_v2.php.
    location ^~ /api/external/ws {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ---- PHP API 路由（取代 member/.htaccess RewriteRule） --------------
    location ~ ^/api/(external|auth|pmppm|credit|exchange)/ { rewrite ^ /api_v2.php last; }
    location = /api/exchange-rates { rewrite ^ /api_v2.php last; }
    location = /api/settle         { rewrite ^ /api_v2.php last; }
    location = /api/bets           { rewrite ^ /api_v2.php last; }
    location = /health             { rewrite ^ /api_v2.php last; }

    # ---- H5 入口鉴权门 -------------------------------------------------
    # 防止陌生人直接打开 /h5/sports.html 之类的 SPA 入口 HTML —— 子请求
    # 回环到 /api/auth/me：登录返回 200 放行，未登录返回 401 → 跳到
    # /index.html?next=<原 URL>，登录页登录成功后会跳回原 URL。
    #
    # auth_request 自动转发请求 Cookie，PHPSESSID 跟着过去。
    # JS/CSS 静态资源（/h5/_next/static/）有更具体的 ^~ 前缀块，前缀最长
    # 匹配胜出，不会被门挡（带 hash 文件名，无 session 也无害）。
    location = /__h5_auth_check {
        internal;
        proxy_pass http://127.0.0.1:8080/api/auth/me;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
    }
    location @h5_login_redirect {
        # 把当前请求的 URI 编码到 next= 里，登录页读它作为登录后跳转目标。
        return 302 /index.html?next=$request_uri;
    }

    # ---- H5 SPA -------------------------------------------------------
    # `/h5/sports` → `/h5/sports.html`
    location = /h5/sports  { return 302 /h5/sports.html; }
    location = /h5/sports/ { return 302 /h5/sports.html; }

    location ^~ /h5/_next/static/ {
        alias /home/ubuntu/crown-gold/wwwroot_F5PEa/application/member/h5/_next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }
    location ^~ /h5/ {
        # 鉴权：未登录任何 /h5/ 路径都被踢回登录页。/h5/_next/static/*
        # 被上面更具体的 ^~ 前缀块捕获，不会进到这里（前缀最长匹配胜出），
        # 所以带 hash 的 JS/CSS 仍可裸下载，不影响登录页或外部 CDN 行为。
        auth_request /__h5_auth_check;
        error_page 401 = @h5_login_redirect;

        # Try real file first, then fall back to /h5/index.html for client
        # routing (matches the .htaccess RewriteRule for /h5/).
        try_files $uri $uri/ /h5/index.html;
        # The .html files themselves get a short cache so clients pick up
        # new bundle hashes within a minute.
        location ~* \.html$ { add_header Cache-Control "public, max-age=60" always; }
    }

    # ---- 报表 / 代理 / 后台子站点 ---------------------------------------
    # 用 alias + try_files; PHP 仍走根 server 的 PHP handler (location ~ \.php$)
    location /d0/ {
        alias /home/ubuntu/crown-gold/wwwroot_F5PEa/application/d0/;
        try_files $uri $uri/ /d0/index.php?$args;
    }
    location /agents/ {
        alias /home/ubuntu/crown-gold/wwwroot_F5PEa/application/agents/;
        try_files $uri $uri/ /agents/index.php?$args;
    }
    location /admin/ {
        alias /home/ubuntu/crown-gold/wwwroot_F5PEa/application/admin/;
        try_files $uri $uri/ /admin/index.php?$args;
    }

    # ---- 共享静态资源（CSS/JS/images） ----------------------------------
    location /static/ {
        alias /home/ubuntu/crown-gold/wwwroot_F5PEa/static/;
        access_log off;
        expires 7d;
    }

    # ---- /images/control/ 共享图标（back-office 公用） ------------------
    # 旧 d0/agents/admin 的内联 CSS 用 url(../../images/control/X.svg)，从
    # /agents/ /admin/ /d0/ 文档解析为 /images/control/X.svg，但默认 root
    # (application/member) 的 control/ 只有 111 个图标，缺 ~50 个 icon_*。
    # application/agents/images/control/ 包含 157 个文件且与其它三个子站点
    # 的同名文件 md5 一致，作为公共图标源使用。
    location ^~ /images/control/ {
        alias /home/ubuntu/crown-gold/wwwroot_F5PEa/application/agents/images/control/;
        access_log off;
        expires 7d;
    }

    # ---- 首页缓存控制 ---------------------------------------------------
    location = / {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # ---- PHP via php7.4-fpm --------------------------------------------
    # NOTE on regex ordering: nginx picks the FIRST matching regex
    # location, so the more specific `^/(d0|agents|admin)/.+\.php$` MUST
    # come before the generic `\.php$`. Otherwise `/d0/index.php` (and
    # /agents/, /admin/) hit the generic handler with $document_root
    # pointing at member/ and php-fpm returns "Primary script unknown".
    location ~ ^/(d0|agents|admin)/.+\.php$ {
        root /home/ubuntu/crown-gold/wwwroot_F5PEa/application;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    # Generic PHP handler for the member root (api_v2.php + legacy member
    # pages). H5 static assets sit under /h5/ which has its own prefix
    # location above and never reaches here.
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }

    # ---- gzip -----------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss text/javascript;
}
