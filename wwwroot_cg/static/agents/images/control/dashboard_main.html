<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <script>{JS}</script>
        <style>{CSS}</style>
        <title></title>
    </head>
    <body>
        <div>
            <div class="dashboard">
                <div class="da_mainbg">
                    <div class="da_banner cn"></div>
                    <div class="da_link">
                        <button id="report_btn" class="link_btn">
                            <span class="link_txt">报表</span>
                        </button>
                        <button id="acc_btn" class="link_btn">
                            <span class="link_txt">帐号管理</span>
                        </button>
                        <button id="bet_btn" class="link_btn">
                            <span class="link_txt">即时注单</span>
                        </button>
                    </div>
                    <div id="box_per" class="da_box performance">
                        <div class="da_title">绩效概况</div>
                        <div class="da_content" id="div_po">
                            <!-- da_btn_box 卷动时 da_btn_container 补上 scroll-->
                            <div class="da_btn_container">
                                <div id="per_box_scroll" class="da_btn_box">
                                    <!-- 点击后在.da_btn加上.active -->
                                    <button id="per_yes" class="da_btn active">昨天</button>
                                    <button id="per_lw" class="da_btn">上周</button>
                                    <button id="per_tp" class="da_btn">本期</button>
                                </div>
                            </div>
                            <div class="da_range">
                                <span>本期:</span>
                                <span id="this_period_performance">-</span>
                            </div>
                            <div class="bar_graph">
                                <label id="div_profit" class="bar_graph_box">
                                    <span class="bar_title">获利率</span>
                                    <!-- 调整字体大小麻烦帮加上.fz36~.fz18 -->
                                    <!-- 负值加上.word_red -->
                                    <span class="bar_value" id="per_profit">-%</span>
                                    <!-- 较之前增加时在#show_compare_profit加上.increase,减少时加上.decrease -->
                                    <div id="show_compare_profit" style="display: none;">
                                        <span class="bar_percent" id="compare_profit" data-inc="比前一天增加" data-dec="比前一天减少">-%</span>
                                        <i class="bar_graph_bg">
                                            <!-- .bar_percent的数值再麻烦帮套到.bar_graph_color的宽度 -->
                                            <i id="compare_per_profit" class="bar_graph_color" style="width: 0%;"></i>
                                        </i>
                                    </div>
                                </label>
                                <div id="div_result" class="bar_graph_box">
                                    <span class="bar_title">赢 / 输</span>
                                    <!-- 负值加上.word_red -->
                                    <span class="bar_value" id="per_result">-</span>
                                    <!-- 较之前增加时在#show_compare_result加上.increase,减少时加上.decrease -->
                                    <div id="show_compare_result" style="display: none;">
                                        <span class="bar_percent" id="compare_result" data-inc="比前一天增加" data-dec="比前一天减少">-%</span>
                                        <i class="bar_graph_bg">
                                            <i id="compare_per_result" class="bar_graph_color" style="width: 0%;"></i>
                                        </i>
                                    </div>
                                </div>
                                <a id="div_stock" class="bar_graph_box">
                                    <span class="bar_title">实货量</span>
                                    <!-- 负值加上.word_red -->
                                    <span class="bar_value" id="per_stock">-</span>
                                    <!-- 较之前增加时在#show_compare_stock加上.increase,减少时加上.decrease -->
                                    <div id="show_compare_stock" style="display: none;">
                                        <span class="bar_percent" id="compare_stock" data-inc="比前一天增加" data-dec="比前一天减少">-%</span>
                                        <i class="bar_graph_bg">
                                            <i id="compare_per_stock" class="bar_graph_color" style="width: 0%;"></i>
                                        </i>
                                    </div>
                                </a>
                            </div>
                        </div>
                        <!-- sysMsg -->
                        <div id="sysmsg_po" class="da_noData" style="display: none;">
                            <img class="da_noData_img" src="../../images/control/da_noData.svg" alt="">
                            <span class="da_noData_txt">维护后才有数据</span>
                        </div>
                        <!-- sysMsg end -->

                        <!-- 区块load -->
                        <!-- 成功 加上class .--success -->
                        <div id="loading_po" class="da_loadBox" style="display:none;">
                            <div class="load_bar"></div>
                            <div class="load_fail">取数据失败。请换网络连接，然后重试。</div>
                        </div>
                        <!-- 区块load end -->
                    </div>
                    <div class="da_container">
                        <div class="da_box">
                            <div class="da_title">帐号概况</div>
                            <div class="da_content">
                                <div class="da_quota">
                                    <span class="quota_title">信用额度</span>
                                    <span class="quota_value" id="credits">-</span>
                                    <div id="balance_show">
                                        <span class="quota_title">剩余额度</span>
                                        <span class="quota_value" id="balance">-</span>
                                    </div>
                                    <span class="quota_title">本期新会员数</span>
                                    <span class="quota_value" id="amount_mem">-</span>
                                </div>
                                <div class="da_time">
                                    <span class="time_title">本期</span>
                                    <span class="time_value" id="this_period">-</span>
                                    <div class="time_half">
                                        <span class="time_title">本期剩余天数</span>
                                        <span class="time_value" id="remaining_days">-</span>
                                    </div>
                                    <div class="time_half">
                                        <span class="time_title">本期完成天数</span>
                                        <span class="time_value" id="completed_days">-</span>
                                    </div>
                                    <div class="time_half">
                                        <span class="time_title">最后登入时间</span>
                                        <span class="time_value" id="last_login">-</span>
                                    </div>
                                    <div class="time_half">
                                        <span class="time_title">密码最后更新时间</span>
                                        <span class="time_value" id="lastdate">-</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="downlineS" class="da_box downline">
                            <div class="da_title">下线状态</div>
                            <div id="div_downline_summary">
                                <div class="da_content">
                                    <!-- da_btn_box 卷动时 da_btn_container 补上 scroll-->
                                    <div class="da_btn_container">
                                        <div id="da_box_scroll" class="da_btn_box">
                                            <button id="da_SU" class="da_btn active">总代理</button>
                                            <button id="da_A" class="da_btn">代理商</button>
                                            <button id="da_M" class="da_btn">会员</button>
                                        </div>
                                    </div>
                                </div>
                                <div id="downline_summary" style="width: 100%; height: 320px;"></div>
                            </div>
                            <!-- sysMsg -->
                            <div id="sysmsg_downline_summary" class="da_noData" style=" display: none;">
                                <img class="da_noData_img" src="../../images/control/da_noData.svg" alt="">
                                <span class="da_noData_txt">维护后才有数据</span>
                            </div>
                            <!-- sysMsg end -->
                        </div>
                    </div>
                    <!--div class="da_box">
                        <div class="da_title">占成收入</div>
                        <div class="da_content"></div>
                    </div-->
                    <div id="box_possess" class="da_box">
                        <div class="da_title">占成收入</div>
                        <div id="div_possess" class="da_scrollBox">
                            <div id="show_possess" class="da_content" style="width: 100%; min-width: 1024px; height: 320px"></div>
                        </div>
                        <!-- sysMsg -->
                        <div id="sysmsg_possess" class="da_noData" style="display: none;">
                            <img class="da_noData_img" src="../../images/control/da_noData.svg" alt="">
                            <span class="da_noData_txt">维护后才有数据</span>
                        </div>
                        <!-- sysMsg end -->
                    </div>
                    <div id="box_members" class="da_box">
                        <div class="da_title">投注人数</div>
                        <div id="div_members" class="da_scrollBox">
                            <div id="show_members" class="da_content" style="width: 100%; min-width: 1024px; height: 320px"></div>
                        </div>
                        <!-- sysMsg -->
                        <div id="sysmsg_members" class="da_noData" style="display: none;">
                            <img class="da_noData_img" src="../../images/control/da_noData.svg" alt="">
                            <span class="da_noData_txt">维护后才有数据</span>
                        </div>
                        <!-- sysMsg end -->
                    </div>
                    <div id="box_turnover" class="da_box">
                        <div class="da_title">实货量</div>
                        <div id="div_turnover" class="da_scrollBox">
                            <div id="show_turnover" class="da_content" style="width: 100%; min-width: 1024px; height: 320px"></div>
                        </div>
                        <!-- sysMsg -->
                        <div id="sysmsg_turnover" class="da_noData" style="display: none;">
                            <img class="da_noData_img" src="../../images/control/da_noData.svg" alt="">
                            <span class="da_noData_txt">维护后才有数据</span>
                        </div>
                        <!-- sysMsg end -->
                    </div>
                    <div id="box_winloss" class="da_box">
                        <div class="da_title">赢 / 输</div>
                        <div id="div_winloss" class="da_scrollBox">
                            <div id="show_winloss" class="da_content" style="width: 100%; min-width: 1024px; height: 320px"></div>
                        </div>
                        <!-- sysMsg -->
                        <div id="sysmsg_winloss" class="da_noData" style="display: none;">
                            <img class="da_noData_img" src="../../images/control/da_noData.svg" alt="">
                            <span class="da_noData_txt">维护后才有数据</span>
                        </div>
                        <!-- sysMsg end -->
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
