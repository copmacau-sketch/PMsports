<!DOCTYPE html>
<html>
<head>
    <title></title>
    <meta charset=utf-8"utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=A">
    <script>{JS}</script>
    <style>{CSS}</style>
</head>
<body>
<div id="div_acc_power" class="accedit_wrap accedit_detail">
    <div class="navbar_btn">
        <div id="btn_cancel" class="btn_cancel">取消</div>
        <div id="btn_save" class="btn_submit">保存</div>
    </div>
    <div class="accadd_content content_l">
        <div>
            <div class="title">公司</div>
            <div class="accadd_box accadd_general">
                <div class="box_market">
                    <div class="select_market">
                        <tt>分公司在线</tt>
                        <label class="select_min">
                            <select name="AD_D0" id="AD_D0">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="AD_D0_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                    <div class="select_market">
                        <tt>股东在线</tt>
                        <label class="select_min">
                            <select name="AD_CO" id="AD_CO">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="AD_CO_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                    <div class="select_market">
                        <tt>总代在线</tt>
                        <label class="select_min">
                            <select name="AD_SU" id="AD_SU">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="AD_SU_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                    <div class="select_market">
                        <tt>代理在线</tt>
                        <label class="select_min">
                            <select name="AD_AG" id="AD_AG">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="AD_AG_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                    <div class="select_market">
                        <tt>私聊会员</tt>
                        <label class="select_min">
                            <select name="AD_MESS" id="AD_MESS">
                                <option>禁用</option>
                            </select>
                        </label>
                        <label id="AD_MESS_LB" class="box_drop select_max" tabindex="0"><!--打开下拉 class="box_drop on"-->
                            <span id="sel_text">禁用</span>
                            <ul id="sel_list" class="drop_down">
                            </ul>
                        </label>
                    </div>
                </div>
                <div>
                    <span class="title_item"><tt>会员在线</tt></span>
                    <div class="box_market">
                        <div class="select_market">
                            <label class="select_min">
                                <select name="AD_MEM" id="AD_MEM">
                                    <option>禁用</option>
                                </select>
                            </label>
                            <label id="AD_MEM_LB" class="box_drop select_max" tabindex="0">
                                <span id="sel_text">禁用</span>
                                <ul id="sel_list" class="drop_down">
                                </ul>
                            </label>
                        </div>                 
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_LOG" id="AD_MEM_LOG" class="ad_mem_son">
                                <tt>记录</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_DOMAIN" id="AD_MEM_DOMAIN" class="ad_mem_son">
                                <tt>网址</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_DOBET" id="AD_MEM_DOBET" class="ad_mem_son">
                                <tt>投注</tt>
                            </label>
                        </div>
                    </div>
                </div>
                <div>
                    <span class="title_item"><tt>改单设置</tt></span>
                    <div class="box_market">
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_EXCHANGE" id="AD_MEM_EXCHANGE" class="ad_mem_dobet_son ad_mem_son">
                                <tt>对调</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_EDIT" id="AD_MEM_EDIT" class="ad_mem_dobet_son ad_mem_son">
                                <tt>修改</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_HIDE" id="AD_MEM_HIDE" class="ad_mem_dobet_son ad_mem_son">
                                <tt>隐藏</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_DEL" id="AD_MEM_DEL" class="ad_mem_dobet_son ad_mem_son">
                                <tt>删除</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_MEM_RESULT" id="AD_MEM_RESULT" class="ad_mem_dobet_son ad_mem_son">
                                <tt>结算</tt>
                            </label>
                        </div>
                        <div class="select_market">
                            <label class="box_check">
                                <input type="checkbox" name="AD_BET_MANGER" id="AD_BET_MANGER" class="ad_mem_dobet_son ad_mem_son">
                                <tt>注单处理</tt>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
