<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script>{JS}</script>

    <link href="{CDNURL}/style/bet_game.css" rel="stylesheet" type="text/css">
    <link href="{CDNURL}/style/clusterize.css" rel="stylesheet" type="text/css">
    <link href="{CDNURL}/style/flag.css" rel="stylesheet" type="text/css">
    <title></title>
</head>
<body>
<div class="content_l">
    <!--import sport html-->
    <div id="sport_content"></div>

    <!--盤面用loading-->
    <div id="game_loading" class="loading loading_on" style="display: none;"><i class="icon_load"></i></div>

    <!--盤面-->
    <div id="main_content" class="content_sport">
        <!--import 盤面 html-->
    </div>

    <!-- 聲明連結 -->
    <div id="relating_box" class="box_relating" style="display: none;">
        <div id="relating_title" class="title_relating"><div>*ART_title_relate*</div></div>
        <div id="relating_content" class="popup_relating"><!-- show Add class="on"-->
            <div class="mask_popup"></div>
            <div class="box_popup">
                <div class="title_popup">
                    <span>*ART_title_relate*</span>
                    <div class="btn_close"><i class="icon_close"><svg><use xlink:href="#icon_close"/></svg></i></div>
                </div>
                <div class="content_popup">
                    *ART_text_relate_text*
                </div>
            </div>
        </div>
    </div>
    <div class="box_empty"></div>

</div>
</body>
</html>
